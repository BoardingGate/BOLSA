    const runScreener = async () => {
        if (!apiKey) return setStatusModal({ isOpen: true, title: 'Error', msg: 'Falta API Key', type: 'error' });
        
        const marketObj = EXCHANGES.find(e => e.id === exchange);
        const marketDesc = marketObj ? marketObj.name : exchange;


        const activeFilters = Object.entries(params)
            .filter(([_, p]) => p.active)
            .map(([k, p]) => {
                if (k === 'roi') return `ROI > ${p.val}%`;
                if (k === 'divYield') return `Dividend Yield > ${p.val}%`;
                if (k === 'per') return `PER < ${p.val}`;
                if (k === 'peg') return `PEG < ${p.val}`;
                if (k === 'pb') return `P/B < ${p.val}`;
                if (k === 'debtEquity') return `Debt/Equity < ${p.val}`;
                if (k === 'fcf') return `FCF Yield > ${p.val}%`;
                return '';
            })
            .join(', ');

        if (!activeFilters) return setStatusModal({ isOpen: true, title: 'Aviso', msg: 'Por favor, activa al menos un parámetro.', type: 'info' });

        setLoading(true);
        try {
            const prompt = `
            YOU ARE A JSON GENERATOR MACHINE. YOU DO NOT SPEAK. YOU ONLY OUTPUT DATA.
            TASK: Generate a JSON Array of ${maxResults} stocks in "${marketDesc}" matching: ${activeFilters}.
            STRICT RULES:
            1. Use your knowledge to estimate current data.
            2. If exact matches are rare, include closest matches.
            3. OUTPUT MUST START WITH '[' AND END WITH ']'.
            4. NO PREAMBLE. NO EXPLANATIONS.
            OUTPUT FORMAT:
            [{"ticker":"SYM","name":"Name","price":1.0,"per":1.0,"peg":1.0,"roi":1.0,"divYield":1.0,"pb":1.0,"debtEquity":1.0,"fcf":1.0}]
            `;

        if (!activeFilters) return setStatusModal({ isOpen: true, title: 'Aviso', msg: 'Por favor, activa al menos un parámetro.', type: 'info' });
            
            const res = await askGemini(apiKey, prompt, aiModel);
            const results = extractJSON(res);
            
            if (!results || !Array.isArray(results) || results.length === 0) {
                console.error("Failed to parse JSON array from:", res);
                throw new Error("Error leyendo datos. La IA devolvió texto en lugar de datos estructurados.");
            }
            setScreenerResults(results);
        } catch (e) {
            setStatusModal({ isOpen: true, title: 'Error de Rastreo', msg: e.message, type: 'error' });
        } finally { setLoading(false); }
    };

    const sortedScreenerResults = useMemo(() => {
        return [...screenerResults].sort((a, b) => {
            const dir = screenerSort.direction === 'asc' ? 1 : -1;
            const valA = a[screenerSort.key] || 0; const valB = b[screenerSort.key] || 0;
            if (typeof valA === 'string') return valA.localeCompare(valB) * dir;
            return (valA - valB) * dir;
        });
    }, [screenerResults, screenerSort]);

                        <p className="mb-4 text-xs">Una auténtica terminal de análisis fundamental impulsada por IA, capaz de recabar datos en tiempo real (Informes de la Empresa, Finviz, SEC, Yahoo Finance, etc). Debe siempre comprobar datos concretos con la realidad, ya que por más que la iA elabore el informe, la veracidad y precisión de los datos en último extremo ha de corroborrarse.</p>

                        <div className="bg-slate-800/40 p-5 rounded-2xl border border-slate-700 mb-4">
                            <h4 className="text-blue-400 font-bold mb-2 uppercase tracking-widest text-[11px]">Sub-pestaña Estudio Individual</h4>
                            <p className="text-xs mb-3">Introduce un Ticker. Puedes escribir una pregunta libre en la barra inferior (Ej: "¿Impacto de la última subida de tipos?") o pulsar uno de los 9 "Prompts Fijos" programados en Wall Street Mode:</p>
                            <ul className="list-disc pl-5 text-xs space-y-1">
                                <li><b>Análisis Completo / Estados / Resultados:</b> Auditan márgenes, deuda y los últimos Earnings Call.</li>
                                <li><b>Valoración (DCF):</b> La IA ejecuta un descuento de flujos de caja para calcular su valor intrínseco.</li>
                                <li><b className="text-cyan-400">Proyección a Futuro:</b> Defines un precio de entrada y años vista. Genera un análisis matemático creando escenarios (Base, Alcista, Bajista) con estimaciones de rentabilidad %.</li>
                                <li><b className="text-indigo-400">Comparativa Sector (Top 10):</b> Rastrea a los 9 rivales directos de la empresa por capitalización y crea una tabla comparando sus PER, Deuda, ROI, y dictamina cuál está más barata.</li>
                            </ul>
                        </div>

                        <div className="bg-slate-800/40 p-5 rounded-2xl border border-slate-700">
                            <h4 className="text-blue-400 font-bold mb-2 uppercase tracking-widest text-[11px]">Sub-pestaña Rastreo de Mercado (Screener)</h4>
                            <p className="text-xs mb-3">Selecciona un país (Ej: Alemania XETRA o EEUU NASDAQ) y activa filtros financieros (Ej: PER menor de 15, Dividend Yield mayor de 4%, D/E menor a 1.5). La IA buscará en todo el mercado y devolverá una tabla con las acciones que cumplen el criterio. <b>Si haces clic en la fila de un resultado, lo enviará instantáneamente a la pestaña Estudio</b> para analizarlo a fondo.</p>
                        </div>
                    </section>

                    {/* ========================================== */}
                    {/* 5. AJUSTES Y CONFIGURACIÓN                 */}
                    {/* ========================================== */}
                    <section>
                        <h3 className="text-xl font-display font-bold text-white border-b-2 border-blue-600 pb-2 mb-4 flex items-center gap-2"><Icons.Settings className="text-blue-500"/> 5. AJUSTES, NUBE Y SEGURIDAD</h3>
                        <p className="mb-4 text-xs">El motor y cerebro del programa. Configurar bien esta sección es fundamental.</p>

                        <div className="space-y-4">
                            <div className="bg-slate-900 p-4 rounded-xl border border-slate-700">
                                <h4 className="text-red-400 font-bold text-[11px] uppercase tracking-widest mb-2">Seguridad (PIN)</h4>
                                <p className="text-xs text-slate-400">Establece un código numérico de 4 dígitos. Si lo haces, al cargar la página se mostrará una pantalla de bloqueo que oculta absolutamente todos tus datos financieros hasta que pongas el PIN correcto.</p>
                            </div>
                            
                            <div className="bg-slate-900 p-4 rounded-xl border border-slate-700">
                                <h4 className="text-purple-400 font-bold text-[11px] uppercase tracking-widest mb-2">Configuración IA (Google Gemini)</h4>
                                <p className="text-xs text-slate-400">Es el cerebro de las pestañas Estudio y de los Informes. Requiere pegar una API Key de Google AI Studio (tienes el enlace en el panel). Puedes usar la versión gratuita (limitada a pocas consultas por minuto) o asociar tarjeta para quitar límites por céntimos al mes. También puedes seleccionar o añadir modelos nuevos (Ej: gemini-2.5-pro).</p>
                            </div>

                            <div className="bg-cyan-900/10 p-4 rounded-xl border border-cyan-500/30 border-l-4 border-l-cyan-500">
                                <h4 className="text-cyan-400 font-bold text-[11px] uppercase tracking-widest mb-2 flex items-center gap-2"><Icons.Globe size={14}/> Sincronización en la Nube (Google Drive)</h4>
                                <p className="text-xs text-slate-300">Si no configuras esto, todos los datos mueren si borras el historial del navegador. Sigue las instrucciones numéricas de la pantalla para crear un "Script" en tu Google Drive. Pegas la URL resultante en el programa y ganarás dos cosas: <b>1. Precios de bolsa instantáneos</b> vía Google Finance, y <b>2. Copias de seguridad automáticas en tu Drive</b>, lo que te permite abrir la app en tu móvil o portátil y tener todo sincronizado. Para usar los datos en segundos equipos, lo más cómodo es sacar una copia de seguridad en local (opción en Ajustes EXPORTAR), llevar ese fichero al equipo nuevo e importarlo. Una vez hecho, siempre y cuando esté configurado la opción de copia en gDrive (configuración que se guarda en el backup local) ya se sincronizan los datos más recientes en cada uno de los equipos, bien al entrar a la web o al forzar un guardado manual.</p>
                            </div>

                            <div className="bg-slate-900 p-4 rounded-xl border border-slate-700">
                                <h4 className="text-pink-400 font-bold text-[11px] uppercase tracking-widest mb-2">Importación Masiva IA</h4>
                                <p className="text-xs text-slate-400">Si ya tienes una cartera gigante en un Excel o en el extracto PDF de tu broker, no tienes que meterla a mano. Sube el PDF o pega el texto en bruto. En "Instrucciones", dile a la IA cómo está estructurado el texto (Ej: "Las fechas están en formato DD/MM/YYYY y la divisa está al final"). La IA leerá tu desorden, extraerá las compras, ventas, precios y fechas, y te generará la cartera entera en 15 segundos.</p>
                            </div>

                            <div className="bg-red-900/10 p-4 rounded-xl border border-red-500/30">
                                <h4 className="text-red-500 font-bold text-[11px] uppercase tracking-widest mb-2">Borrado Masivo</h4>
                                <p className="text-xs text-red-200">Destruye toda la base de datos de tu cartera, dividendos y resultados (manteniendo a salvo tus claves API y configuraciones). Útil si estabas haciendo pruebas y quieres empezar a meter dinero real desde cero. Por seguridad, forzará la descarga de un Backup en tu PC antes de ejecutar el borrado.</p>
                            </div>
                        </div>
                    </section>
                    {/* ========================================== */}
                    {/* 6. DESCARGO DE RESPONSABILIDAD             */}
                    {/* ========================================== */}
                    <section>
                        <h3 className="text-xl font-display font-bold text-red-400 border-b-2 border-red-900/50 pb-2 mb-4 flex items-center gap-2">
                            <Icons.AlertCircle className="text-red-500"/> 6. AVISO LEGAL Y DESCARGO DE RESPONSABILIDAD
                        </h3>
                        
                        <div className="bg-red-950/20 p-5 rounded-2xl border border-red-900/30 space-y-4">
                            <div>
                                <h4 className="text-red-400 font-bold mb-1 uppercase tracking-widest text-[11px]">1. Propósito Estrictamente Educativo e Informativo</h4>
                                <p className="text-xs text-slate-300">BoardingGate es una herramienta diseñada única y exclusivamente con fines didácticos, de organización personal y de análisis simulado. Ningún contenido, métrica, proyección o texto mostrado en esta plataforma constituye, ni debe interpretarse bajo ninguna circunstancia, como asesoramiento financiero, fiscal, legal o recomendación de inversión profesional.</p>
                            </div>

                            <div>
                                <h4 className="text-red-400 font-bold mb-1 uppercase tracking-widest text-[11px]">2. Naturaleza de la Inteligencia Artificial (IA)</h4>
                                <p className="text-xs text-slate-300 mb-2">Todos los informes, estrategias, análisis técnicos, redacciones fiscales y "veredictos" de inversión generados dentro de la plataforma son elaborados de forma automatizada por modelos de Inteligencia Artificial. Debes tener en cuenta que la IA:</p>
                                <ul className="list-disc pl-5 text-xs text-slate-300 space-y-1">
                                    <li>Puede cometer errores, realizar cálculos incorrectos o sufrir "alucinaciones" (inventar datos).</li>
                                    <li>No tiene en cuenta tu situación financiera personal, tu horizonte temporal, ni tu perfil o percentil de riesgo como inversor.</li>
                                    <li>Cualquier estrategia propuesta debe ser revisada, cuestionada y valorada personalmente (o junto a un asesor financiero certificado) antes de ejecutarse en el mercado real.</li>
                                </ul>
                            </div>

                            <div>
                                <h4 className="text-red-400 font-bold mb-1 uppercase tracking-widest text-[11px]">3. Integridad y Exactitud de los Datos</h4>
                                <p className="text-xs text-slate-300">Los precios de cotización, divisas (FX), ratios fundamentales y noticias se extraen mediante conexiones a servicios de terceros o mediante la propia IA. El desarrollador no garantiza la exactitud, latencia, integridad ni disponibilidad de estos datos. Es responsabilidad exclusiva del usuario contrastar siempre la información con fuentes oficiales (ej. SEC, CNMV, webs de Relación con Inversores) antes de tomar decisiones vinculantes.</p>
                            </div>

                            <div className="bg-red-900/20 p-4 rounded-xl border border-red-500/30 mt-4">
                                <h4 className="text-red-500 font-bold mb-1 uppercase tracking-widest text-[11px]">4. Exención Absoluta de Responsabilidad</h4>
                                <p className="text-xs text-red-200/80 leading-relaxed">El uso de BoardingGate es bajo tu propio riesgo. El desarrollador, creador o mantenedor de esta plataforma declina expresa y categóricamente cualquier responsabilidad, directa o indirecta, por cualquier pérdida de capital, daño patrimonial, perjuicio económico o error fiscal derivado del uso, interpretación o mal uso de la información proporcionada por esta herramienta. <strong>Tus decisiones de inversión son única y exclusivamente tu responsabilidad.</strong></p>
                            </div>
                        </div>
                    </section>

                </div>
                
                <div className="pt-4 border-t border-slate-700 flex justify-end mt-4">
                    <button onClick={() => setIsHelpModalOpen(false)} className="bg-yellow-600 hover:bg-yellow-500 text-white font-black py-3 px-8 rounded-xl shadow-lg transition-colors tracking-widest uppercase text-xs">He leído el manual</button>
                </div>
            </Modal>        
          


            {syncMessage && <div className="fixed top-6 left-1/2 -translate-x-1/2 z-[200] bg-blue-600/90 text-white px-6 py-3 rounded-full shadow-2xl font-bold text-xs flex items-center gap-2 fade-in backdrop-blur-md border border-white/10">{syncStatus === 'uploading' ? <Icons.Upload className="animate-bounce"/> : syncStatus === 'error' ? <Icons.AlertCircle/> : <Icons.CheckCircle/>} {syncMessage}</div>}
            {!isAppReady && !conflictModal.isOpen && <div className="fixed inset-0 z-[250] bg-black flex flex-col items-center justify-center"><Icons.Loader size={40} className="text-blue-500 animate-spin mb-4"/><div className="text-slate-400 text-xs uppercase font-bold tracking-widest animate-pulse">Sincronizando con la Nube...</div></div>}
            <header className="shrink-0 bg-slate-900 border-b border-slate-800 px-6 py-4 flex justify-between items-center z-50"><div><h1 className="text-2xl font-display font-bold">Boarding<span className="text-blue-600">Gate</span></h1><p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Gestor de Cartera de Valores iA</p></div><nav className="flex bg-slate-800 rounded-lg p-1 gap-1 border border-slate-700 overflow-x-auto whitespace-nowrap custom-scrollbar">
    <button onClick={() => setActiveTab('portfolio')} className={`px-4 py-2 rounded-md text-[10px] font-bold uppercase flex items-center gap-2 transition-all ${activeTab === 'portfolio' ? 'bg-blue-600 text-white' : 'text-slate-400 hover:text-white'}`}><Icons.Briefcase size={14}/> Cartera</button>
    <button onClick={() => setActiveTab('dividends')} className={`px-4 py-2 rounded-md text-[10px] font-bold uppercase flex items-center gap-2 transition-all ${activeTab === 'dividends' ? 'bg-blue-600 text-white' : 'text-slate-400 hover:text-white'}`}><Icons.DollarSign size={14}/> Dividendos</button>
    <button onClick={() => setActiveTab('results')} className={`px-4 py-2 rounded-md text-[10px] font-bold uppercase flex items-center gap-2 transition-all ${activeTab === 'results' ? 'bg-blue-600 text-white' : 'text-slate-400 hover:text-white'}`}><Icons.ChartBar size={14}/> Resultados</button>
    <button onClick={() => setActiveTab('analysis')} className={`px-4 py-2 rounded-md text-[10px] font-bold uppercase flex items-center gap-2 transition-all ${activeTab === 'analysis' ? 'bg-blue-600 text-white' : 'text-slate-400 hover:text-white'}`}><Icons.Search size={14}/> Estudio</button>
    <button onClick={() => setActiveTab('settings')} className={`px-4 py-2 rounded-md text-[10px] font-bold uppercase flex items-center gap-2 transition-all ${activeTab === 'settings' ? 'bg-blue-600 text-white' : 'text-slate-400 hover:text-white'}`}><Icons.Settings size={14}/> Ajustes</button>
    <button onClick={() => setIsHelpModalOpen(true)} className="px-4 py-2 rounded-md text-[10px] font-bold uppercase flex items-center gap-2 transition-all text-yellow-500 hover:bg-yellow-500/20 border border-transparent hover:border-yellow-500/50 ml-2"><Icons.HelpCircle size={14}/> Ayuda</button>
</nav></header>
            <main className="flex-1 overflow-y-auto bg-[#0a0a0a] relative custom-scrollbar">
                {activeTab === 'portfolio' && (
                    <PortfolioTab 
                        portfolio={portfolio} 
                        setPortfolio={updatePortfolio} 
                        apiKey={apiKey} 
                        baseCurrency={baseCurrency} 
                        refreshInterval={refreshInterval} 
                        lastUpdate={lastUpdate} 
                        setLastUpdate={setLastUpdate} 
                        resultsData={resultsData} 
                        syncStatus={syncStatus} 
                        onManualSync={uploadToCloud} 
                        isAppReady={isAppReady} 
                        _x_lim={_0xCap} 
                        _x_trig={setBlockAction} 
                        globalNotes={globalNotes} 
                        setGlobalNotes={(val) => updateConfig(setGlobalNotes, val)}
                                            
                        onAnalyze={(ticker) => {
                            setAnalysisTicker(ticker);
                            setActiveTab('analysis');
                        }}
                        aiModel={aiModel}
                        gScriptUrl={gScriptUrl}
                    />


                )}
                {activeTab === 'dividends' && <DividendTab portfolio={portfolio} setPortfolio={updatePortfolio} baseCurrency={baseCurrency} syncStatus={syncStatus} onManualSync={uploadToCloud} />}
                {activeTab === 'results' && <ResultsTab portfolio={portfolio} resultsData={resultsData} setResultsData={updateResultsData} baseCurrency={baseCurrency} syncStatus={syncStatus} onManualSync={uploadToCloud} apiKey={apiKey} aiModel={aiModel} />}

                {activeTab === 'analysis' && (
                    <AnalysisTab 
                        apiKey={apiKey} 
                        baseCurrency={baseCurrency} 
                        setPortfolio={updatePortfolio}
                        initialTicker={analysisTicker}
                        aiModel={aiModel}
                        gScriptUrl={gScriptUrl}
                    />
                )}
                
               {activeTab === 'settings' && <SettingsTab 
                    apiKey={apiKey} setApiKey={(val) => updateConfig(setApiKey, val)} 
                    _x_stat={_0xAuth} _x_act={_0xReg} 
                    baseCurrency={baseCurrency} setBaseCurrency={(val) => updateConfig(setBaseCurrency, val)} 
                    refreshInterval={refreshInterval} setRefreshInterval={(val) => updateConfig(setRefreshInterval, val)} 
                    portfolio={portfolio} setPortfolio={updatePortfolio} 
                    onForceBackup={uploadToCloud} 
                    gScriptUrl={gScriptUrl} setGScriptUrl={(val) => updateConfig(setGScriptUrl, val)} 
                    resultsData={resultsData} setResultsData={updateResultsData} 
                    appPin={appPin} setAppPin={(val) => updateConfig(setAppPin, val)} 
                    aiModel={aiModel} setAiModel={(val) => updateConfig(setAiModel, val)} 
                    availableModels={availableModels} setAvailableModels={(val) => updateConfig(setAvailableModels, val)} 
                    globalNotes={globalNotes} setGlobalNotes={(val) => updateConfig(setGlobalNotes, val)} 
                />}

       </main>
            <footer className="shrink-0 bg-slate-900 border-t border-slate-800 py-1 px-6 flex justify-between items-center text-[8px] text-slate-600 font-bold uppercase"><div>BoardingGate 3.3 (Secure PIN)</div><div className="flex gap-4"><span>Estado: {syncStatus === 'synced' ? 'Sincronizado en gDrive' : syncStatus === 'unsaved' ? 'Cambios sin guardar en gDrive' : 'Comprobando...'}</span><span>Ult. Mod. Datos Local: {localTimestamp > 0 ? new Date(localTimestamp).toLocaleTimeString() : 'N/A'}</span></div></footer>
        </div>
    );
};

      createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
