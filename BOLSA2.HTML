const ResultsTab = ({ portfolio, resultsData, setResultsData, baseCurrency, syncStatus, onManualSync, apiKey, aiModel }) => {
    const r2 = (num) => Math.round((parseFloat(num) || 0) * 100) / 100;
    
    // --- ESTADOS PARA RENTA CON IA ---
    const [isRentaModalOpen, setIsRentaModalOpen] = useState(false);
    const [rentaYear, setRentaYear] = useState(new Date().getFullYear() - 1);
    const [isGeneratingRenta, setIsGeneratingRenta] = useState(false);
    const [rentaReport, setRentaReport] = useState(null);
    const [isRentaReportModalOpen, setIsRentaReportModalOpen] = useState(false);

    // Obtener rango de años
    const getDisplayYears = () => { 
        const yearsSet = new Set(); 
        if (portfolio.length === 0) return [new Date().getFullYear()-1, new Date().getFullYear(), new Date().getFullYear()+1]; 
        
        portfolio.forEach(p => { 
            if (p.buyDate) yearsSet.add(new Date(p.buyDate).getFullYear()); 
            if (p.sellDate) yearsSet.add(new Date(p.sellDate).getFullYear()); 
            if (p.dividends) p.dividends.forEach(d => yearsSet.add(d.year)); 
        }); 
        
        if (yearsSet.size === 0) return [new Date().getFullYear()-1, new Date().getFullYear(), new Date().getFullYear()+1]; 
        
        const sorted = Array.from(yearsSet).sort((a, b) => a - b); 
        const minYear = sorted[0]; 
        const maxYear = sorted[sorted.length - 1]; 
        const range = []; 
        for (let y = minYear - 1; y <= maxYear + 1; y++) range.push(y); 
        return range; 
    };

    // LÓGICA DE RECALCULO MASIVO
    const handleRecalculate = () => { 
        const newData = { ...resultsData }; 
        const yearsToCalc = getDisplayYears(); 
        let runningAccum = 0; 

        yearsToCalc.forEach(y => { 
            if (!newData[y]) {
                newData[y] = { locked:false, soldCount:0, uniqueCount:0, profitPrice:0, dividends:0, lossPrice:0, fees:0, resNoDiv:0, resWithDiv:0, tax:0, accumulated:0, rentaResNoDiv:0, rentaFees:0, rentaAdj:0, rentaBase:0, comp1: 0, comp2: 0, comp3: 0, comp4: 0, compRest: 0 }; 
            }
            
            const currentData = newData[y];

            if (currentData.locked) { 
                runningAccum = r2(runningAccum + (parseFloat(currentData.resWithDiv) || 0)); 
                newData[y].accumulated = runningAccum; 
                return; 
            } 

            let yearProfitPrice = 0; let yearLossPrice = 0; let yearFees = 0; let lotesTotal = 0; let yearDivs = 0;
            const uniqueTickers = new Set(); 

            const sales = portfolio.filter(p => p.sellDate && new Date(p.sellDate).getFullYear() === y); 
            lotesTotal = sales.length; 

            sales.forEach(p => { 
                uniqueTickers.add(p.ticker); 
                const shares = parseFloat(p.shares) || 0;
                const buyP = parseFloat(p.buyPrice) || 0; const buyF = parseFloat(p.buyFx) || 1;
                const sellP = parseFloat(p.sellPrice) || 0; const sellF = parseFloat(p.sellFx) || 1;
                const buyFees = p.feesIncludedInPrice ? 0 : (parseFloat(p.fees) || 0); const buyAdj = parseFloat(p.adjustments) || 0;
                const sellFees = p.sellFeesIncludedInPrice ? 0 : (parseFloat(p.sellFees) || 0); const sellAdj = parseFloat(p.sellAdjustments) || 0;

                const cost = r2((buyP * shares * buyF) + buyFees + buyAdj); 
                const revenueNet = r2((sellP * shares * sellF) - sellFees - sellAdj); 
                const pl = r2(revenueNet - cost); 

                if (pl >= 0) yearProfitPrice += pl; 
                else yearLossPrice += Math.abs(pl); 
                
                yearFees += r2(buyFees + buyAdj + sellFees + sellAdj); 
            }); 

            portfolio.forEach(p => { 
                if (p.dividends && Array.isArray(p.dividends)) { 
                    p.dividends.forEach(d => { if (d.year === y) yearDivs += (parseFloat(d.net) || 0); }); 
                } 
            }); 

            yearProfitPrice = r2(yearProfitPrice); yearLossPrice = r2(yearLossPrice); yearDivs = r2(yearDivs); yearFees = r2(yearFees); 
            const resNoDiv = r2(yearProfitPrice - yearLossPrice); 
            const resWithDiv = r2(resNoDiv + yearDivs); 
            const tax = resNoDiv > 0 ? r2(resNoDiv * 0.19) : 0; 
            runningAccum = r2(runningAccum + resWithDiv); 

            const rentaResNoDiv = resNoDiv;
            const rentaAdj = parseFloat(currentData.rentaAdj) || 0;
            const rentaBase = r2(rentaResNoDiv + rentaAdj);

            let finalCompRest = parseFloat(currentData.compRest) || 0;

                const c1 = parseFloat(currentData.comp1) || 0; const c2 = parseFloat(currentData.comp2) || 0; const c3 = parseFloat(currentData.comp3) || 0; const c4 = parseFloat(currentData.comp4) || 0; 
                finalCompRest = r2(rentaBase + c1 + c2 + c3 + c4); 
            } else { finalCompRest = 0; }

            newData[y] = { ...newData[y], soldCount: lotesTotal, uniqueCount: uniqueTickers.size, profitPrice: yearProfitPrice, dividends: yearDivs, lossPrice: yearLossPrice, fees: yearFees, resNoDiv: resNoDiv, resWithDiv: resWithDiv, tax: tax, accumulated: runningAccum, rentaResNoDiv: rentaResNoDiv, rentaFees: yearFees, rentaAdj: rentaAdj, rentaBase: rentaBase, comp1: parseFloat(currentData.comp1) || 0, comp2: parseFloat(currentData.comp2) || 0, comp3: parseFloat(currentData.comp3) || 0, comp4: parseFloat(currentData.comp4) || 0, compRest: finalCompRest }; 
        }); 
        setResultsData(newData); 
    };

    useEffect(() => { handleRecalculate(); }, [portfolio.length, portfolio]);

    const handleEdit = (year, field, val) => {

            if (field === 'dividends') { d.resWithDiv = r2(d.resNoDiv + d.dividends); }
            if (field === 'resNoDiv') { d.tax = d.resNoDiv > 0 ? r2(d.resNoDiv * 0.19) : 0; d.resWithDiv = r2(d.resNoDiv + d.dividends); d.accumulated = r2(d.resNoDiv - d.tax); d.rentaResNoDiv = d.resNoDiv; d.rentaBase = r2(d.rentaResNoDiv + (d.rentaAdj || 0)); }
            if (field === 'rentaAdj' || field === 'rentaResNoDiv') { d.rentaBase = r2(d.rentaResNoDiv + d.rentaAdj); }
            if (['comp1', 'comp2', 'comp3', 'comp4', 'rentaBase', 'profitPrice', 'lossPrice', 'resNoDiv', 'rentaAdj'].includes(field)) { if (d.rentaBase < 0) { const c1 = parseFloat(d.comp1) || 0; const c2 = parseFloat(d.comp2) || 0; const c3 = parseFloat(d.comp3) || 0; const c4 = parseFloat(d.comp4) || 0; d.compRest = r2(d.rentaBase + c1 + c2 + c3 + c4); } else { d.compRest = 0; } }

    const yearsToShow = getDisplayYears();

        return { soldCount: acc.soldCount + (curr.soldCount || 0), profitPrice: acc.profitPrice + (curr.profitPrice || 0), dividends: acc.dividends + (curr.dividends || 0), lossPrice: acc.lossPrice + (curr.lossPrice || 0), fees: acc.fees + (curr.fees || 0), resNoDiv: acc.resNoDiv + (curr.resNoDiv || 0), resWithDiv: acc.resWithDiv + (curr.resWithDiv || 0), tax: acc.tax + (curr.tax || 0), rentaBase: acc.rentaBase + (curr.rentaBase || 0), accumulated: acc.accumulated + (curr.accumulated || 0) }; 
    }, { soldCount: 0, profitPrice: 0, dividends: 0, lossPrice: 0, fees: 0, resNoDiv: 0, resWithDiv: 0, tax: 0, rentaBase: 0, accumulated: 0 });

    const chartData = useMemo(() => { return yearsToShow.map(y => ({ label: y.toString(), value: (resultsData[y]?.resWithDiv || 0) })); }, [resultsData, yearsToShow]);

    // --- LÓGICA DE GENERACIÓN DEL INFORME RENTA CON IA ---
  const handleGenerateRentaReport = async () => {
        if (!apiKey) {
            alert("⚠️ API Key no configurada. Ve a 'Ajustes' para conectar la iA.");

            const isISIN = (str) => /^[A-Z]{2}[A-Z0-9]{9}[0-9]$/i.test(String(str).trim());

                const shares = parseFloat(p.shares) || 0;

                const revenue = (parseFloat(p.sellPrice) * shares * parseFloat(p.sellFx)) - (p.sellFeesIncludedInPrice ? 0 : parseFloat(p.sellFees||0)) - parseFloat(p.sellAdjustments||0);
                const pl = revenue - cost;
                
                if (isISIN(p.ticker)) {
                    if (pl >= 0) totalGainFunds += pl; else totalLossFunds += Math.abs(pl);
                    fundSalesList.push(`Fecha Compra: ${formatD(p.buyDate)} | Fecha Venta: ${formatD(p.sellDate)} | Fondo: ${p.ticker} (${p.name}) | Compra: ${formatMoney(cost, baseCurrency)} | Reembolso: ${formatMoney(revenue, baseCurrency)} | Resultado: ${formatMoney(pl, baseCurrency)}`);
                } else {
                    if (pl >= 0) totalGainStocks += pl; else totalLossStocks += Math.abs(pl);
                    stockSalesList.push(`Fecha Compra: ${formatD(p.buyDate)} | Fecha Venta: ${formatD(p.sellDate)} | Acción: ${p.ticker} (${p.name}) | Compra: ${formatMoney(cost, baseCurrency)} | Venta: ${formatMoney(revenue, baseCurrency)} | Resultado: ${formatMoney(pl, baseCurrency)}`);
                }
            });

            // 3. Recopilar Compensaciones Pendientes (4 años anteriores)
            let pendingComp = 0;
            const compDetails = [];
            for (let i = 1; i <= 4; i++) {
                const y = rentaYear - i;
                const d = resultsData[y];
                if (d && d.compRest < 0) {
                    pendingComp += Math.abs(d.compRest);
                    compDetails.push(`- Año ${y}: Pendiente de compensar ${formatMoney(Math.abs(d.compRest), baseCurrency)}`);
                }
            }

            // 4. Construir Prompt Experto Fiscal
            const prompt = `
            ROL: Eres un Asesor Fiscal Colegiado, experto en el IRPF de España.
            TAREA: Redactar un manual paso a paso, sumamente detallado, para que el usuario rellene su Declaración de la Renta del Ejercicio Fiscal ${rentaYear} (campaña del año ${rentaYear + 1}).
            
            INSTRUCCIÓN DE ESTILO Y MAQUETACIÓN (¡VITAL!):
            La información debe estar MUY BIEN ESTRUCTURADA. EVITA TOTALMENTE los párrafos densos o apelotonados y en NINGÚN CASO USES SOMBREADOS DONDE LA LETRA NO RESALTE SOBRE ESE COLOR DE FONDO, ANTE LA DUDA USA LETRA NEGRA CON FONDO GRIS CLARO.

            INSTRUCCIÓN DE DATOS: 
            Busca en internet la información más actualizada sobre la RENTA DEL EJERCICIO ${rentaYear} en la Agencia Tributaria Española, para proporcionar las CASILLAS EXACTAS vigentes y la normativa si es preciso que explique su cometido.
            
            AQUÍ TIENES LOS DATOS REALES DE LA CARTERA DEL USUARIO:

            1. DESGLOSE DE DIVIDENDOS COBRADOS:
            ${divDetails.length > 0 ? divDetails.join('\n') : 'No hay dividendos cobrados este ejercicio.'}
            --> TOTALES DIVIDENDOS: Bruto: ${formatMoney(divBruto, baseCurrency)} | Ret. Extranjera: ${formatMoney(divRetExt, baseCurrency)} | Ret. España: ${formatMoney(divRetEsp, baseCurrency)} | Base para Deducción Doble Imposición (Límite 15% aplicado): ${formatMoney(divDobleImp15, baseCurrency)}

            2. DESGLOSE DE VENTA DE ACCIONES:
            ${stockSalesList.length > 0 ? stockSalesList.join('\n') : 'No se realizaron ventas de acciones este ejercicio.'}
            --> TOTALES ACCIONES: Ganancias brutas totales: ${formatMoney(totalGainStocks, baseCurrency)} | Pérdidas brutas totales: ${formatMoney(totalLossStocks, baseCurrency)}

            3. DESGLOSE DE REEMBOLSOS DE FONDOS DE INVERSIÓN:
            ${fundSalesList.length > 0 ? fundSalesList.join('\n') : 'No se realizaron reembolsos de fondos de inversión este ejercicio.'}
            --> TOTALES FONDOS: Ganancias brutas totales: ${formatMoney(totalGainFunds, baseCurrency)} | Pérdidas brutas totales: ${formatMoney(totalLossFunds, baseCurrency)}

            4. COMPENSACIÓN DE PÉRDIDAS DE AÑOS ANTERIORES:
            - Saldo total pendiente aplicable este año: ${formatMoney(pendingComp, baseCurrency)}
            ${compDetails.length > 0 ? compDetails.join('\n') : '- No hay saldos pendientes de años anteriores.'}

            FORMATO DE SALIDA REQUERIDO (Usa código HTML limpio, text-align left para textos y right para números):

            <h3>1. INSTRUCCIONES PARA DECLARAR DIVIDENDOS</h3>
            <p>Indica de forma clara, con párrafos cortos, la sección del Renta Web y las CASILLAS EXACTAS para el importe bruto (indicar importe), la retención nacional (indicar importe), y la casilla para aplicar la deducción por doble imposición internacional con el importe de ${formatMoney(divDobleImp15, baseCurrency)}.</p>
            [AQUÍ DEBES GENERAR UNA TABLA HTML con el desglose Ticker a Ticker de los dividendos indicados arriba (Columnas: Ticker, Bruto, Ret. Origen, Ret. Destino, Neto). INCLUYE UNA FILA FINAL DE TOTALES AL PIE DE LA TABLA. Usa un estilo corporativo sencillo: <table style="width:100%; border-collapse:collapse; margin-top:10px; margin-bottom:20px;" border="1">...</table> con encabezados y pies con letras negra, roja o azul y fondo gris].

            <h3>2. INSTRUCCIONES PARA DECLARAR VENTA DE ACCIONES</h3>
            <p>Indica la sección y las CASILLAS correspondientes en Renta Web. Aconseja brevemente sobre la agrupación de operaciones.</p>
            [AQUÍ DEBES GENERAR OTRA TABLA HTML con las operaciones de venta de acciones desglosadas arriba (Columnas: Fecha compra, Fecha venta, Acción, Importe Compra, Importe Venta, Plusvalía/Pérdida). INCLUYE UNA FILA FINAL DE TOTALES AL PIE DE LA TABLA separando Ganancias y Pérdidas. Aplica el mismo estilo de tabla que en dividendos].

            <h3>3. INSTRUCCIONES PARA DECLARAR REEMBOLSOS DE FONDOS DE INVERSIÓN</h3>
            <p>Indica de forma clara en qué apartado y en qué CASILLAS EXACTAS del Modelo 100 se declaran las ganancias y pérdidas patrimoniales derivadas de la transmisión o reembolso de acciones o participaciones de Instituciones de Inversión Colectiva (Fondos). <b>IMPORTANTE:</b> Indica explícitamente cuál es la casilla donde el usuario debe anotar la <b>Retención Practicada</b> (habitualmente del 19%) sobre las plusvalías de los fondos.</p>
            [AQUÍ DEBES GENERAR OTRA TABLA HTML con las operaciones de fondos desglosadas arriba (Columnas: Fecha compra, Fecha venta, Fondo, Importe Compra, Importe Reembolso, Plusvalía/Pérdida). INCLUYE UNA FILA FINAL DE TOTALES AL PIE DE LA TABLA separando Ganancias y Pérdidas. Si no hubo reembolsos de fondos, simplemente indícalo amablemente].

            <h3>4. APLICACIÓN DE COMPENSACIONES PENDIENTES</h3>
            <p>Explica en párrafos MUY CORTOS en qué apartado de la Base Imponible del Ahorro debe entrar el usuario para compensar los ${formatMoney(pendingComp, baseCurrency)} de años pasados.</p>

            <h3>5. RESUMEN FINAL DE CASILLAS E IMPORTES A INTRODUCIR</h3>
            <ul>
                [Crea una lista limpia y espaciada con el formato: <b>Casilla XXX:</b> Importe correspondiente y descripción corta. ¡Asegúrate de incluir la casilla de retenciones de fondos si aplica!]
            </ul>
            `;

            const res = await askGemini(apiKey, prompt, aiModel);
            
            // Limpiar HTML de los backticks de la respuesta de Gemini
            let cleanHtml = res.trim().replace(/```html/g, '').replace(/```/g, '');
            const startIdx = cleanHtml.indexOf('<');
            if (startIdx !== -1) cleanHtml = cleanHtml.substring(startIdx);

            setRentaReport(cleanHtml);
            setIsRentaReportModalOpen(true);

        } catch (e) {
            alert("Error al generar el informe fiscal: " + e.message);

            setIsGeneratingRenta(false);
        }
    };

// --- COMPONENTE: DASHBOARD ESTADÍSTICO (CORREGIDO) ---
      const StatsDashboard = ({ portfolio, baseCurrency, taxTotal }) => {
          const [view, setView] = useState(0); 

          const metrics = useMemo(() => {
              // Filtrar solo los activos para los cálculos
              const active = portfolio.filter(p => !p.sellDate && p.isActive !== false);
              const closed = portfolio.filter(p => !!p.sellDate && p.isActive !== false);
              const r2 = (n) => Math.round((parseFloat(n) || 0) * 100) / 100;

              const calcGroup = (items) => {
                  let totalInv = 0, totalCur = 0, divTotal = 0;
                  let winCount = 0, lossCount = 0, winAmt = 0, lossAmt = 0;
                  let daysTotal = 0, maxDays = 0, minDays = Infinity;
                  let maxInv = 0, minInv = Infinity;

                  items.forEach(p => {
                        const isS = !!p.sellDate;
                        const costT = r2((p.buyPrice * p.shares * p.buyFx) + (p.feesIncludedInPrice ? 0 : (p.fees || 0)) + (p.adjustments || 0));
                        const eP = isS ? p.sellPrice : (p.isIndex ? p.currentPrice / (p.indexDivisor || 1) : p.currentPrice);
                        const eF = isS ? p.sellFx : (p.isIndex ? p.buyFx : p.currentFx);
                        const vN = r2((eP * p.shares * eF) - (isS ? (p.sellFeesIncludedInPrice ? 0 : (p.sellFees || 0)) + (p.sellAdjustments || 0) : 0));
                        
                        const divs = (p.dividends || []).reduce((acc,d) => acc+d.net, 0);
                        const plTotal = r2((vN + divs) - costT);
                        const days = calculateDays(p.buyDate, p.sellDate || new Date());

                        totalInv += costT; totalCur += vN; divTotal += divs; daysTotal += days;
                        maxInv = Math.max(maxInv, costT); minInv = Math.min(minInv, costT);
                        maxDays = Math.max(maxDays, days); minDays = Math.min(minDays, days);

                        if(plTotal >= 0) { winCount++; winAmt += plTotal; } else { lossCount++; lossAmt += Math.abs(plTotal); }
                    });  

                  if(minInv === Infinity) minInv = 0; if(minDays === Infinity) minDays = 0;
                  const finalValuation = totalCur + divTotal;
                  const ratio = totalInv > 0 ? finalValuation / totalInv : 0;
                  const yieldPct = totalInv > 0 ? (divTotal / totalInv) * 100 : 0;
                  return { count: items.length, winCount, lossCount, winAmt, lossAmt, avgDays: items.length ? daysTotal/items.length : 0, maxDays, minDays, avgCap: items.length ? totalInv/items.length : 0, maxInv, minInv, balance: (totalCur - totalInv), divs: divTotal, yieldPct, accum: (totalCur - totalInv + divTotal), ratio, totalInv, finalValuation };
              };
              
              const openM = calcGroup(active); const closedM = calcGroup(closed);
              const globalInv = openM.totalInv + closedM.totalInv; const globalVal = openM.finalValuation + closedM.finalValuation; const totalRatio = globalInv > 0 ? globalVal / globalInv : 0;
              
              // RANKING LOGIC (SEPARADO)
              const processItem = (p) => {
                  const cost = r2((p.buyPrice * p.shares * p.buyFx) + (p.feesIncludedInPrice?0:(p.fees||0)) + (p.adjustments||0));
                  const isS = !!p.sellDate;
                  const curP = isS ? p.sellPrice : (p.isIndex ? p.currentPrice/(p.indexDivisor||1) : p.currentPrice);
                  const curF = isS ? p.sellFx : (p.isIndex ? p.buyFx : p.currentFx);
                  const val = r2((curP * p.shares * curF) - (isS ? (p.sellFeesIncludedInPrice?0:(p.sellFees||0)) + (p.sellAdjustments||0) : 0));
                  const divs = (p.dividends || []).reduce((acc,d) => acc+d.net, 0);
                  const plTotal = r2((val + divs) - cost);
                  const days = calculateDays(p.buyDate, p.sellDate || new Date());
                  const ret = calcReturns(cost, val + divs, days);
                  return { ...p, cost, val, divs, plTotal, days, ret, isS };
              };

              const activeList = active.map(processItem).sort((a,b) => b.plTotal - a.plTotal);
              const closedList = closed.map(processItem).sort((a,b) => b.plTotal - a.plTotal);

              return { 
                  openM, closedM, totalRatio, globalInv, globalVal,
                  activeTop4: activeList.slice(0, 4),
                  activeBottom4: activeList.slice(-4).reverse(),
                  closedTop4: closedList.slice(0, 4),
                  closedBottom4: closedList.slice(-4).reverse()
              };
          }, [portfolio]);

          const Row = ({ label, leftVal, rightVal, isHeader = false, highlight = false, heightClass = '' }) => ( <div className={`grid grid-cols-3 text-[10px] border-b border-slate-700/50 ${isHeader ? 'bg-slate-700/50 font-bold text-slate-300' : 'hover:bg-slate-800/30'} ${highlight ? 'bg-yellow-900/10' : ''} ${heightClass}`}> <div className="p-1 pl-2 text-slate-400 uppercase font-bold flex items-center">{label}</div> <div className="p-1 text-right border-l border-slate-800 pr-2 font-mono text-slate-200 flex flex-col justify-center">{leftVal}</div> <div className="p-1 text-right border-l border-slate-800 pr-2 font-mono text-slate-200 flex flex-col justify-center">{rightVal}</div> </div> );
          const fK = (v) => { if (Math.abs(v) >= 1000) return (v/1000).toFixed(1) + 'k'; return v.toFixed(0); };

          const RankRow = ({ item }) => (

                      <span className={`font-bold text-[10px] truncate ${item.isS ? 'text-orange-300' : 'text-blue-300'}`}>{item.name.substring(0,15)}</span>

                  </div>
                  <div className="flex flex-col w-[30%] text-right">
                       <span className={`font-bold text-[10px] ${item.plTotal>=0?'text-green-400':'text-red-400'}`}>{formatMoney(item.plTotal, baseCurrency)}</span>
                       <span className="text-[8px] text-slate-500">Tot. (inc Div)</span>
                  </div>
                  <div className="flex flex-col w-[30%] text-right">
                       <span className={`font-bold text-[10px] ${item.ret.simple>=0?'text-green-400':'text-red-400'}`}>{formatN(item.ret.simple)}%</span>
                       <span className="text-[8px] text-slate-500">{formatN(item.ret.annual)}% Anual</span>
                  </div>
              </div>
          );

          return (
              <div className="w-full bg-slate-900 border border-slate-700 rounded-sm mb-6 shadow-2xl overflow-hidden font-sans relative group">
                  <div className="bg-gray-600 text-white text-[10px] font-bold p-1 px-2 uppercase tracking-wider flex justify-between items-center">
                      <span>Estadísticas sobre operaciones abiertas y cerradas</span>
                      <div className="flex gap-4 items-center">
                          <button onClick={()=>setView(prev => Math.max(0, prev-1))} disabled={view===0} className={`text-white hover:text-blue-400 disabled:opacity-30 transition-colors font-bold text-lg`}>{'◄'}</button>
                          <span className="text-[9px] text-slate-300">{view===0?'Resumen':'Ranking'}</span>
                          <button onClick={()=>setView(prev => Math.min(1, prev+1))} disabled={view===1} className={`text-white hover:text-blue-400 disabled:opacity-30 transition-colors font-bold text-lg`}>{'►'}</button>
                      </div>
                  </div>
                  <div className="flex transition-transform duration-500 ease-in-out" style={{ transform: `translateX(-${view * 100}%)` }}>
                      <div className="min-w-full">
                          <div className="flex flex-col lg:flex-row"><div className="flex-1">
                              <div className="grid grid-cols-3 bg-gray-500/20 text-[9px] uppercase font-bold text-slate-400 border-b border-slate-700"><div className="p-1 pl-2">Total y media histórica</div><div className="p-1 text-right pr-2 text-yellow-100">Abiertas</div><div className="p-1 text-right pr-2 text-red-100">Cerradas</div></div>
                              <Row label="Número Operaciones" leftVal={<span className="text-yellow-400 font-bold text-sm">{metrics.openM.count}</span>} rightVal={<span className="text-yellow-400 font-bold text-sm">{metrics.closedM.count}</span>} />

const DividendTab = ({ portfolio, setPortfolio, baseCurrency, syncStatus, onManualSync }) => {
    const [selectedYear, setSelectedYear] = useState(new Date().getFullYear());
    const [showAllHistory, setShowAllHistory] = useState(false);

    const r2 = (n) => Math.round((parseFloat(n) || 0) * 100) / 100;

    const formatDateSimple = (d) => {
        if(!d) return '';
        const date = new Date(d);
        return `${date.getDate().toString().padStart(2,'0')}/${(date.getMonth()+1).toString().padStart(2,'0')}/${date.getFullYear().toString().slice(-2)}`;
    };

    const paymentSchedule = useMemo(() => {
        const schedule = {};
        const prevYear = selectedYear - 1;
        portfolio.forEach(p => {
            // Filtramos dividendos que ocurrieron exactamente en el año previo y tuvieron cobro neto
            const monthsInPrevYear = (p.dividends || [])
                .filter(d => d.year === prevYear && d.net > 0)
                .map(d => d.month);
            schedule[p.id] = [...new Set(monthsInPrevYear)];
        });
        return schedule;
    }, [portfolio, selectedYear]);

    const filtered = useMemo(() => {
        return portfolio.filter(p => { 
            if (showAllHistory) return (p.dividends && p.dividends.length > 0) || p.annualDividend > 0;
            const paysDiv = p.annualDividend > 0;
            const hasDivsInYear = (p.dividends || []).some(d => d.year === selectedYear && d.net !== 0);
            const bY = new Date(p.buyDate).getFullYear(); 
            const sY = p.sellDate ? new Date(p.sellDate).getFullYear() : 9999; 
            return (paysDiv || hasDivsInYear) && bY <= selectedYear && sY >= selectedYear; 
        }).sort((a,b) => {
            const aClosed = !!a.sellDate; const bClosed = !!b.sellDate;
            if(aClosed !== bClosed) return aClosed ? 1 : -1;
            return a.name.localeCompare(b.name);
        });
    }, [portfolio, selectedYear, showAllHistory]);

    const handleDivChange = (id, month, field, val) => { 
        if (showAllHistory) return;
        const numVal = r2(val); 
        setPortfolio(prev => prev.map(p => { 
            if (p.id !== id) return p; 
            let divs = [...(p.dividends || [])]; 
            const idx = divs.findIndex(d => d.year === selectedYear && d.month === month); 
            if (idx >= 0) divs[idx][field] = numVal; 
            else divs.push({ id: Date.now() + Math.random(), year: selectedYear, month, net: field === 'net' ? numVal : 0, taxOrigin: field === 'taxOrigin' ? numVal : 0, taxDest: field === 'taxDest' ? numVal : 0 }); 
            return { ...p, dividends: divs }; 
        })); 
    };
    
    const stats = useMemo(() => {
        let tNet = 0, tOrg = 0, tDest = 0, tBruto = 0, tDIB = 0, tDI15 = 0;
        const monthlyT = Array.from({ length: 12 }, () => ({ n: 0, o: 0, d: 0 }));
        
        const rows = filtered.map(p => {
            const ds = (p.dividends || []).filter(d => showAllHistory ? true : d.year === selectedYear);
            const n = r2(ds.reduce((a, b) => a + (b.net || 0), 0));
            const o = r2(ds.reduce((a, b) => a + (b.taxOrigin || 0), 0));
            const d = r2(ds.reduce((a, b) => a + (b.taxDest || 0), 0));
            const b = r2(n + o + d);
            // Lógica B.D.I: Si hay retención en origen en el periodo, el bruto es base para deducción
            const diBruto = o > 0 ? b : 0; 
            // 15%: Cálculo sobre la columna B.D.I.
            const di15 = r2(diBruto * 0.15); 
            
            tNet = r2(tNet + n); tOrg = r2(tOrg + o); tDest = r2(tDest + d);
            tBruto = r2(tBruto + b); tDIB = r2(tDIB + diBruto); tDI15 = r2(tDI15 + di15);
            
            const rowMonths = Array.from({ length: 12 }, () => ({ n: 0, o: 0, d: 0 }));
            ds.forEach(div => { 
                if (div.month >= 0 && div.month < 12) { 
                    rowMonths[div.month].n = r2(rowMonths[div.month].n + (div.net || 0)); 
                    rowMonths[div.month].o = r2(rowMonths[div.month].o + (div.taxOrigin || 0)); 
                    rowMonths[div.month].d = r2(rowMonths[div.month].d + (div.taxDest || 0)); 
                    monthlyT[div.month].n = r2(monthlyT[div.month].n + (div.net || 0)); 
                    monthlyT[div.month].o = r2(monthlyT[div.month].o + (div.taxOrigin || 0)); 
                    monthlyT[div.month].d = r2(monthlyT[div.month].d + (div.taxDest || 0)); 
                } 
            });
            return { id: p.id, name: p.name, ticker: p.ticker, n, o, d, b, diBruto, di15, rowMonths };
        });
        
        const tickerChartData = rows.filter(r => r.n > 0).map(r => ({ label: r.ticker, value: r.n })).sort((a,b) => b.value - a.value);
        const annualHistoryMap = {};
        portfolio.forEach(p => {
            (p.dividends || []).forEach(d => {
                annualHistoryMap[d.year] = r2((annualHistoryMap[d.year] || 0) + d.net);
            });
        });
        const annualChartData = Object.keys(annualHistoryMap).sort((a,b) => a - b).map(year => ({ label: year, value: annualHistoryMap[year] }));

        return { rows, tNet, tOrg, tDest, tBruto, tDIB, tDI15, monthlyT, tickerChartData, annualChartData };
    }, [filtered, selectedYear, showAllHistory, portfolio]);

    const chartDataMonthly = useMemo(() => stats.monthlyT.map((m, i) => ({ label: MONTHS[i].substring(0,3), value: m.n })), [stats]);
const handlePrint = () => {

    );
};


const SettingsTab = ({ apiKey, setApiKey, _x_stat, _x_act, baseCurrency, setBaseCurrency, refreshInterval, setRefreshInterval, portfolio, setPortfolio, onForceBackup, gScriptUrl, setGScriptUrl, resultsData, setResultsData, appPin, setAppPin, _x_lim, _x_trig, aiModel, setAiModel, availableModels, setAvailableModels, globalNotes, setGlobalNotes }) => {
    const [localLic, setLocalLic] = useState(''); 
    const [showKey, setShowKey] = useState(false); 
    const [testStatus, setTestStatus] = useState(null); 
    const [errorDetail, setErrorDetail] = useState(''); 
    const [ioStatus, setIoStatus] = useState('idle');
    const [showUrl, setShowUrl] = useState(false); 
    
    // ESTADOS PARA IMPORTACIÓN
    const [importMethod, setImportMethod] = useState('pdf'); 
    const [pdfFile, setPdfFile] = useState(null); 
    const [rawTextData, setRawTextData] = useState('');
    const [pdfPrompt, setPdfPrompt] = useState('Analiza este listado y extrae las operaciones de compra/venta.'); 
    const [importing, setImporting] = useState(false); 
    const [importResult, setImportResult] = useState(null);

    // ESTADOS PARA PIN (NUEVO)
    const [tempPin, setTempPin] = useState(appPin || '');
    const [pinVisible, setPinVisible] = useState(false);

    const simpleEncrypt = (text) => { if(!text) return ''; try { return btoa(text.split('').map((c, i) => String.fromCharCode(c.charCodeAt(0) + (i % 5))).join('')); } catch { return text; } };
    const simpleDecrypt = (text) => { if(!text) return ''; try { return atob(text).split('').map((c, i) => String.fromCharCode(c.charCodeAt(0) - (i % 5))).join(''); } catch { return text; } };

    const sanitizeAndParseJSON = (text) => { 
        try {
            let clean = text.replace(/```json/g, '').replace(/```/g, '').trim();
            const firstBracket = clean.indexOf('[');
            const lastBracket = clean.lastIndexOf(']');
            
            if (firstBracket !== -1 && lastBracket !== -1) {
                clean = clean.substring(firstBracket, lastBracket + 1);
                return JSON.parse(clean);
            }
            return JSON.parse(clean);
        } catch (e) { 
            console.error("Raw AI Response:", text);
            throw new Error("La IA no devolvió un JSON válido. Ver detalles en consola."); 
        } 
    };

    const testConnection = async () => { if(!apiKey) return alert("Introduce una clave primero."); setTestStatus('loading'); setErrorDetail(''); try { await askGemini(apiKey, "Test conexión", aiModel); setTestStatus('success'); } catch(e) { setTestStatus('error'); setErrorDetail(e.message); } };
    
    const handleRunExport = () => { 
        setIoStatus('processing'); 
        try { 
            // SE CONFIRMA: Guarda en Local EXACTAMENTE lo mismo que sube a la Nube
            const data = { portfolio, apiKey, baseCurrency, refreshInterval, version: 3, resultsData, appPin, aiModel, availableModels, gScriptUrl, globalNotes }; 
            const blob = new Blob([JSON.stringify(data, null, 2)], {type: "application/json"}); 
            const url = URL.createObjectURL(blob); 
            const a = document.createElement('a'); a.href = url; a.download = `BoardingGate_Backup_${new Date().toISOString().slice(0,10)}.json`; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url); setIoStatus('success'); setTimeout(() => setIoStatus('idle'), 2000); 
        } catch (e) { alert("Error: " + e.message); setIoStatus('error'); } 
    };

    const handleMassDelete = () => {
        // Primera Confirmación
        if (!confirm("⚠️ ATENCIÓN: Vas a borrar todas las acciones, dividendos y datos de resultados.\n\nSe descargará automáticamente una COPIA DE SEGURIDAD antes de proceder. ¿Continuar?")) {
            return;
        }

        // 1. Ejecutamos la copia de seguridad automáticamente
        handleRunExport();

        // Pequeña pausa para asegurar que el navegador procesa la descarga
        setTimeout(() => {
            // Segunda Confirmación
            if (confirm("✅ COPIA DE SEGURIDAD DESCARGADA.\n\nESTA ES LA ÚLTIMA ADVERTENCIA:\n¿Estás totalmente seguro de que quieres dejar la cartera vacía? Esta acción no se puede deshacer.")) {
                setPortfolio([]); // Vacía acciones y dividendos
                setResultsData({}); // Vacía la tabla de resultados anuales
                alert("Cartera vaciada correctamente. Los ajustes se han mantenido.");
            }
        }, 1000);
    };
    
    const handleRunImport = (e) => { 
        const file = e.target.files[0]; 
        if (!file) return; 
        if(!confirm("⚠️ IMPORTANTE:\n\nEsta acción reemplazará TODA tu cartera y configuración actual.\n\n¿Estás seguro de continuar?")) { e.target.value = null; return; } 
        setIoStatus('processing'); 
        const reader = new FileReader(); 
        reader.onload = (ev) => { 
            try { 
                const d = JSON.parse(ev.target.result); 
                // RESTAURA EXACTAMENTE LOS MISMOS 11 PARÁMETROS
                if (d.portfolio) setPortfolio(d.portfolio); 
                if (d.resultsData) setResultsData(d.resultsData);
                if (d.apiKey !== undefined) setApiKey(d.apiKey); 
                if (d.baseCurrency) setBaseCurrency(d.baseCurrency); 
                if (d.gScriptUrl !== undefined) setGScriptUrl(d.gScriptUrl);  
                if (d.refreshInterval) setRefreshInterval(d.refreshInterval); 
                if (d.appPin !== undefined) setAppPin(d.appPin); 
                if (d.aiModel) setAiModel(d.aiModel); 
                if (d.availableModels) setAvailableModels(d.availableModels);
                if (d.globalNotes !== undefined) setGlobalNotes(d.globalNotes);
                
                setIoStatus('success'); 
                alert("✅ Restauración completada correctamente."); 
                window.location.reload(); 
            } catch (err) { alert("Archivo inválido o corrupto."); setIoStatus('error'); } 
        }; 
        reader.readAsText(file); 
    };



    const handleAiImport = async () => { 
        if (!apiKey) return alert("Falta API Key"); 
        if (importMethod === 'pdf' && !pdfFile) return alert("Selecciona un PDF");
        if (importMethod === 'text' && !rawTextData.trim()) return alert("Pega el texto de tus acciones");

        setImporting(true); 
        setImportResult(null); 

        try { 
            let dataToAnalyze = "";
            if (importMethod === 'pdf') {
                try { dataToAnalyze = await readPdfText(pdfFile); } catch (pdfErr) { throw new Error("No se pudo leer el PDF. Es posible que sea una imagen escaneada o esté protegido."); }
            } else { dataToAnalyze = rawTextData; }

            const truncatedText = dataToAnalyze.substring(0, 50000); 
            const prompt = `
              ROLE: Data Extraction Expert.
              GOAL: Convert the following unstructured financial text into a Strict JSON Array.
              INSTRUCTIONS: "${pdfPrompt}"
              INPUT DATA: """${truncatedText}"""
              OUTPUT REQUIREMENTS:
              1. Return ONLY a JSON Array. No markdown formatting, no intro text.
              2. Use this schema for each item:
              [{
                  "ticker": "SYMBOL (e.g., AAPL, SAN.MC)",
                  "name": "Company Name",
                  "shares": number (positive integer),
                  "buyPrice": number (price per share),
                  "buyDate": "YYYY-MM-DD" (guess if missing, default to 2024-01-01),
                  "stockCurrency": "USD/EUR/GBP",
                  "buyFx": number (exchange rate to base currency, default 1),
                  "fees": number (total transaction fees),
                  "sellDate": "YYYY-MM-DD" (ONLY if it's a SELL operation, else null),
                  "sellPrice": number (price per share if sold, else 0),
                  "sellFx": number (default 1),
                  "sellFees": number
              }]
              3. If a row represents a SELL, populate 'sellDate' and 'sellPrice'. If it's a BUY or currently held, keep sellDate null.
              4. Ignore headers, totals, or footer text.
            `;

            const res = await askGemini(apiKey, prompt, aiModel); 
            
            
            const extractedData = sanitizeAndParseJSON(res); 

            if (Array.isArray(extractedData)) { 
                if ((portfolio.length + extractedData.length) > _x_lim) {
                    throw new Error("CAPACITY_OVERFLOW_EXCEPTION"); 
                }

                setPortfolio(prev => { 
                    const newItems = extractedData.map(item => ({ 
                        ...item, 
                        id: Date.now() + Math.random(), 
                        group: 'Importado IA', 
                        isActive: true, 
                        dividends: [], 
                        adjustments: 0, 
                        buyPE: 0, 
                        currentPE: 0, 
                        annualDividend: 0, 
                        currentPrice: item.sellDate ? 0 : item.buyPrice, 
                        currentFx: item.buyFx 
                    })); 
                    return [...prev, ...newItems]; 
                }); 
                setImportResult({ success: true, count: extractedData.length, rawResponse: null }); 
            } else { 
                throw new Error("La IA respondió, pero no devolvió una lista (Array)."); 
            } 
        } catch (e) { 
            if (e.message === "CAPACITY_OVERFLOW_EXCEPTION") _x_trig(true);
                setImportResult({ success: false, error: e.message === "CAPACITY_OVERFLOW_EXCEPTION" ? "Error de Capacidad IO." : e.message, rawResponse: null }); 
            } finally { 
                setImporting(false); 
                setPdfFile(null); 
                } 
            };

    return (
        <div className="h-full p-6 flex flex-col items-center justify-start fade-in overflow-y-auto custom-scrollbar">
            {importing && <div className="absolute inset-0 z-50 bg-black/80 backdrop-blur-sm flex flex-col items-center justify-center fade-in"><Icons.Loader size={60} className="text-purple-500 mb-4 animate-spin" /><div className="text-xl font-bold text-white animate-pulse">Analizando Datos...</div><div className="text-xs text-slate-400 mt-2">La IA está leyendo tu documento</div></div>}
            
            {importResult && ( 
                <div className="absolute inset-0 z-[60] bg-black/90 flex items-center justify-center p-4 fade-in"> 
                    <div className="bg-slate-900 border border-slate-700 p-6 rounded-xl max-w-lg w-full text-center shadow-2xl"> 
                        {importResult.success ? ( 
                            <> <div className="text-green-500 mb-4 mx-auto"><Icons.CheckCircle size={50}/></div> <h3 className="text-xl font-bold text-white mb-2">Importación Completada</h3> <p className="text-slate-400 text-sm mb-6">Se han añadido <strong>{importResult.count}</strong> registros a tu cartera.</p> </> 
                        ) : ( 
                            <> 
                              <div className="text-red-500 mb-4 mx-auto"><Icons.AlertCircle size={50}/></div> 
                              <h3 className="text-xl font-bold text-white mb-2">Error de Importación</h3> 
                              <p className="text-red-300 text-sm mb-4 font-bold">{importResult.error}</p>
                              <div className="text-left bg-black p-2 rounded border border-slate-800 text-[10px] font-mono text-slate-400 max-h-32 overflow-y-auto mb-4">
                                  {importResult.rawResponse || "Sin detalles adicionales."}
                              </div>
                              <p className="text-slate-500 text-xs italic">Consejo: Si el PDF falla, prueba a copiar el texto del PDF y usar la opción "Pegar Texto".</p>
                            </> 
                        )} 
                        <button onClick={()=>setImportResult(null)} className="bg-slate-700 px-6 py-2 rounded-lg font-bold text-white hover:bg-slate-600 border border-slate-600">Cerrar</button> 
                    </div> 
                </div>

            {/* --- SECCIÓN NUEVA: SEGURIDAD PIN --- */}
            <div className="max-w-2xl w-full bg-slate-900/80 border border-slate-800 rounded-2xl p-8 shadow-2xl mb-8">

                    </div>

            </div>

           {/* CONFIGURACIÓN IA */}
            <div className="max-w-2xl w-full bg-slate-900/80 border border-slate-800 rounded-2xl p-8 shadow-2xl mb-8">

{`function A_AUTORIZAR_AQUI() {
  var files = DriveApp.getFiles(); 
  UrlFetchApp.fetch("https://www.google.com");
  console.log("✅ Permisos concedidos.");
}

function doPost(e) {
  var lock = LockService.getScriptLock(); 
  lock.tryLock(10000);
  try {
    var data = JSON.parse(e.postData.contents);
    var fileName = "BOARDINGGATE_DB.json";
    var files = DriveApp.getFilesByName(fileName);
    var file = files.hasNext() ? files.next() : DriveApp.createFile(fileName, "", MimeType.PLAIN_TEXT);
    file.setContent(JSON.stringify(data));
    return ContentService.createTextOutput(JSON.stringify({ status: "success", timestamp: data.timestamp })).setMimeType(ContentService.MimeType.JSON);
  } catch(e) { 
    return ContentService.createTextOutput(JSON.stringify({status: "error", error: e.toString()})).setMimeType(ContentService.MimeType.JSON); 
  } finally { lock.releaseLock(); }
}

function doGet(e) {
  if (e.parameter.tickers) { return fetchStockData(e.parameter.tickers); }
  try {
    var files = DriveApp.getFilesByName("BOARDINGGATE_DB.json");
    if (files.hasNext()) { return ContentService.createTextOutput(files.next().getBlob().getDataAsString()).setMimeType(ContentService.MimeType.JSON); }
    return ContentService.createTextOutput(JSON.stringify({timestamp:0})).setMimeType(ContentService.MimeType.JSON);
  } catch(e) { return ContentService.createTextOutput(JSON.stringify({error:e.toString()})).setMimeType(ContentService.MimeType.JSON); }
}

function fetchStockData(tickersString) {
  var tickerList = tickersString.split(",");
  var requests = [];
  var validTickers = [];
  for (var i = 0; i < tickerList.length; i++) {
    var rawTicker = tickerList[i].trim();
    if(!rawTicker) continue;
    var url;
    if (rawTicker.length === 6 && !rawTicker.includes(":")) {
       url = "https://www.google.com/finance/quote/" + rawTicker.substring(0,3) + "-" + rawTicker.substring(3,6);
    } else {
       var parts = rawTicker.split(':');
       var gTicker = parts.length === 2 ? parts[1] + ":" + parts[0] : rawTicker;
       url = "https://www.google.com/finance/quote/" + encodeURIComponent(gTicker);
    }
    requests.push({ url: url, method: "GET", muteHttpExceptions: true, headers: { "User-Agent": "Mozilla/5.0" } });
    validTickers.push(rawTicker);
  }
  var results = {};
  try {
    var responses = UrlFetchApp.fetchAll(requests);
    for (var j = 0; j < responses.length; j++) {
      var rawTicker = validTickers[j];
      if (responses[j].getResponseCode() === 200) {
        var html = responses[j].getContentText();
        var res = { success: false };
        var priceMatch = html.match(/<div class="AHmHk"[^>]*>[\s\S]*?<div class="YMlKec[^"]*">([^<]+)<\/div>/);
        if (priceMatch) {
          res.p = cleanNumGAS(priceMatch[1]);
          res.success = true;
          res.n = (html.match(/<div class="zz7u7b">([^<]+)<\/div>/) || [])[1];
          // CAPTURAR FECHA DE GOOGLE
          var dateMatch = html.match(/<div class="ygm7ab"[^>]*>([^<]+)<\/div>/) || html.match(/<div class="mfs7Fc"[^>]*>([^<]+)<\/div>/);
          res.dt = dateMatch ? dateMatch[1] : "";
          var getV = function(labels) {
            for (var k=0; k<labels.length; k++) {
              var m = html.match(new RegExp(labels[k] + '[\\s\\S]*?<div class="P6K39c">([^<]+)<\\/div>'));
              if (m) return m[1].trim();
            } return null;
          };
          res.pe = cleanNumGAS(getV(["Ratio precio-beneficio", "P/E ratio"]));
          res.div = cleanNumGAS(getV(["Rentabilidad por dividendo", "Dividend yield"]));
          res.pc = cleanNumGAS(getV(["Cierre anterior", "Previous close"]));
          res.mc = getV(["Capitalización bursátil", "Market cap"]);
          res.eps = cleanNumGAS(getV(["Beneficio por acción", "Earnings per share"]));
          res.beta = cleanNumGAS(getV(["Beta"]));
          res.h52 = getV(["Rango de 52 semanas", "52-week range"]);
        }
        results[rawTicker] = res;
      }
    }
  } catch(err) { return ContentService.createTextOutput(JSON.stringify({error: err.toString()})).setMimeType(ContentService.MimeType.JSON); }
  return ContentService.createTextOutput(JSON.stringify(results)).setMimeType(ContentService.MimeType.JSON);
}

function cleanNumGAS(str) {
  if (!str) return 0;
  var val = str.replace(/[^0-9.,-]/g, '');
  if (val.indexOf(',') > -1 && val.indexOf('.') > -1) { 
    if (val.lastIndexOf(',') > val.lastIndexOf('.')) { val = val.replace(/\./g, '').replace(',', '.'); } 
    else { val = val.replace(/,/g, ''); }
  } else if (val.indexOf(',') > -1) { val = val.replace(',', '.'); }
  return parseFloat(val) || 0;
}`}

        const calculateFIFODetail = (p, qtyToSell) => {
            const fDateEU = (d) => d ? d.split('-').reverse().join('-') : '';
            const r2 = (n) => Math.round((parseFloat(n) || 0) * 100) / 100;
            const r6 = (n) => Math.round((parseFloat(n) || 0) * 1000000) / 1000000;
        
            // Clonamos lotes o creamos uno virtual si no existen
            let lots = p.lots && p.lots.length > 0 ? JSON.parse(JSON.stringify(p.lots)) : [{
                id: Date.now(), date: p.buyDate, shares: p.shares, price: p.buyPrice, 
                fx: p.buyFx, fees: p.fees, adj: p.adjustments, pe: p.buyPE
            }];
            
            // FIFO: Primero en entrar, primero en salir
            lots.sort((a, b) => new Date(a.date) - new Date(b.date));
        
            let remainingToSell = qtyToSell;
            let ext = { shares: 0, costBase: 0, costFx: 0, fees: 0, adj: 0, weightedTime: 0, desc: [] };
            let newLots = [];
        
            lots.forEach(lot => {
                const lS = parseFloat(lot.shares) || 0;
                const lP = parseFloat(lot.price) || 0;
                const lF = parseFloat(lot.fx) || 1;
        
                if (remainingToSell <= 0) {
                    newLots.push(lot);
                    return;
                }
        
                const take = Math.min(lS, remainingToSell);
                const ratio = take / lS;
        
                // Datos para el apunte de VENTA
                ext.shares += take;
                ext.costBase += (take * lP);
                ext.costFx += (take * lP * lF);
                ext.fees = r2(ext.fees + (lot.fees * ratio));
                ext.adj = r2(ext.adj + (lot.adj * ratio));
                ext.weightedTime += (new Date(lot.date).getTime() * take);
                
                ext.desc.push(`• ${formatN(take)} acc. del ${fDateEU(lot.date)} [P: ${formatN(lP, 3)} | FX: ${formatN(lF, 4)} | Gtos: ${formatN(r2(lot.fees * ratio) + r2(lot.adj * ratio))}]`);
        
                // Datos para lo que SE QUEDA en el lote
                if (lS > take) {
                    newLots.push({
                        ...lot,
                        shares: r6(lS - take),
                        fees: r2(lot.fees * (1 - ratio)),
                        adj: r2(lot.adj * (1 - ratio))
                    });
                }
                remainingToSell -= take;
            });
        
            return {
                extracted: {
                    shares: r6(ext.shares),
                    buyPrice: r6(ext.costBase / ext.shares),
                    buyFx: r6(ext.costFx / ext.costBase),
                    buyDate: new Date(ext.weightedTime / ext.shares).toISOString().split('T')[0],
                    buyDateEU: fDateEU(new Date(ext.weightedTime / ext.shares).toISOString().split('T')[0]),
                    fees: r2(ext.fees),
                    adj: r2(ext.adj),
                    summary: "\n" + ext.desc.join('\n') 
                },
                remainingLots: newLots
            };

    };

                if (p.currentPE > 0) { sumCurPE += p.currentPE; countCurPE++; }
            });

            const avgD = inv > 0 ? weightedDays / inv : 0;
            const rP = calcReturns(inv, cur, avgD);
            const rT = calcReturns(inv, cur + divN, avgD);
            
        
            return { 
                num: items.length, 
                inv, 
                cur, 
                divN, 
                fX, 
                plPrice: cur - inv, 
                plTotal: (cur + divN) - inv, 
                plP_S: rP.simple, 
                plP_A: rP.annual, 
                plT_S: rT.simple, 
                plT_A: rT.annual, 
                intra, 
                // ESTA LÍNEA ES LA QUE CALCULA EL % GLOBAL PARA EL TARJETÓN:
                intraPct: prevValTotal !== 0 ? (intra / prevValTotal) * 100 : 0, 
                avgBuyPE: countBuyPE > 0 ? sumBuyPE / countBuyPE : 0, 
                avgCurPE: countCurPE > 0 ? sumCurPE / countCurPE : 0, 
                totalFeesAdj 
            };

        };

        return { 
            stats: { 
                active: calc(baseFilteredPortfolio.filter(p => !p.sellDate)), 
                sold: calc(baseFilteredPortfolio.filter(p => !!p.sellDate)), 
                total: calc(baseFilteredPortfolio) 
            }, 
            gridMetrics: calc(visiblePortfolio) 
        };
    }, [baseFilteredPortfolio, visiblePortfolio, baseCurrency]);

    const stats = globalMetrics.stats;
    const gridTotals = {
        tFx: globalMetrics.gridMetrics.fX,
        tCost: globalMetrics.gridMetrics.inv,
        tVal: globalMetrics.gridMetrics.cur,
        tRes: globalMetrics.gridMetrics.plTotal,
        tPct: globalMetrics.gridMetrics.plT_S,
        tIntra: globalMetrics.gridMetrics.intra,
        tIntraPct: globalMetrics.gridMetrics.intraPct,
        avgBuyPE: globalMetrics.gridMetrics.avgBuyPE,
        avgCurPE: globalMetrics.gridMetrics.avgCurPE,
        tFeesAdj: globalMetrics.gridMetrics.totalFeesAdj
    };
 
    const historicalStats = useMemo(() => {
        const activeP = baseFilteredPortfolio.filter(p => !p.sellDate);
        const soldP = baseFilteredPortfolio.filter(p => !!p.sellDate);
        const allP = baseFilteredPortfolio;
        
        const calcAvgCapital = (items) => {
            if (items.length === 0) return { avgCap: 0, profit: 0, first: null, last: null, diffDays: 0 };
            const sortedByBuy = [...items].sort((a,b) => new Date(a.buyDate) - new Date(b.buyDate));
            const firstDate = new Date(sortedByBuy[0].buyDate);
            let lastDate = new Date();
            if (items.every(p => p.sellDate)) {
                const sortedBySell = [...items].sort((a,b) => new Date(b.sellDate) - new Date(a.sellDate));
                lastDate = new Date(sortedBySell[0].sellDate);
            }
            const totalPeriodDays = Math.max(1, (lastDate - firstDate) / (1000 * 60 * 60 * 24));
            let weightedSum = 0;
            let totalProfit = 0;
            items.forEach(p => {
                const cost = (p.buyPrice * p.shares * p.buyFx) + (p.feesIncludedInPrice ? 0 : (p.fees || 0)) + (p.adjustments || 0);
                const endDate = p.sellDate ? new Date(p.sellDate) : new Date();
                const daysHeld = Math.max(0, (endDate - new Date(p.buyDate)) / (1000 * 60 * 60 * 24));
                weightedSum += (cost * daysHeld);
                const isS = !!p.sellDate;
                const curP = isS ? p.sellPrice : (p.isIndex ? p.currentPrice / (p.indexDivisor || 1) : p.currentPrice);
                const curF = isS ? p.sellFx : (p.isIndex ? p.buyFx : p.currentFx);
                const vF = (curP * p.shares * curF) - (isS ? (p.sellFeesIncludedInPrice ? 0 : (p.sellFees || 0)) + (p.sellAdjustments || 0) : 0);
                const divs = (p.dividends || []).reduce((acc,d) => acc+d.net, 0);
                totalProfit += (vF - cost) + divs;
            });
            const avgCap = weightedSum / totalPeriodDays;
            return { avgCap, profit: totalProfit, first: firstDate, last: lastDate, diffDays: totalPeriodDays };
        };

        const allOps = [];
        allP.forEach(p => {
            allOps.push({ d: new Date(p.buyDate).getTime(), type: 'buy' });
            if(p.sellDate) allOps.push({ d: new Date(p.sellDate).getTime(), type: 'sell' });
        });
        allOps.sort((a,b) => a.d - b.d);
        let diffSum = 0;
        for(let i=1; i<allOps.length; i++) {
            diffSum += (allOps[i].d - allOps[i-1].d);
        }
        const avgIntervalDays = allOps.length > 1 ? (diffSum / (allOps.length - 1)) / (1000 * 60 * 60 * 24) : 0;
        const firstEver = allOps.length > 0 ? allOps[0].d : Date.now();
        const lastEver = allOps.length > 0 ? allOps[allOps.length-1].d : Date.now();
        const totalTimeSpan = Math.max(1, (lastEver - firstEver)/(1000*60*60*24));
        let totalDaysOpenAccum = 0;
        allP.forEach(p => {
            const end = p.sellDate ? new Date(p.sellDate) : new Date();
            totalDaysOpenAccum += Math.max(0, (end - new Date(p.buyDate))/(1000*60*60*24));
        });
        const avgPositions = totalTimeSpan > 0 ? totalDaysOpenAccum / totalTimeSpan : 0;

        return { consolidated: calcAvgCapital(allP), closed: calcAvgCapital(soldP), active: calcAvgCapital(activeP), avgIntervalDays, avgPositions };
    }, [baseFilteredPortfolio]);

    const activeFilteredPortfolio = useMemo(() => { return visiblePortfolio; }, [visiblePortfolio]); 



    const chartsData = useMemo(() => {

        const weightsData = activeFilteredPortfolio.filter(p => !p.sellDate).map(p => {
            const cost = (p.buyPrice * p.shares * p.buyFx) + (p.feesIncludedInPrice ? 0 : (p.fees || 0)) + (p.adjustments || 0);
            const curP = p.isIndex ? p.currentPrice / (p.indexDivisor||1) : p.currentPrice;
            const curF = p.isIndex ? p.buyFx : p.currentFx;
            const val = (curP * p.shares * curF); 
            return { ticker: p.ticker, cost, val };
        });

        const geoMap = {}; 
        activeFilteredPortfolio.filter(p => !p.sellDate).forEach(p => { const region = getRegion(p.ticker); const val = ((p.currentPrice / (p.isIndex ? p.indexDivisor||1 : 1)) * p.shares * (p.isIndex ? p.buyFx : p.currentFx)); geoMap[region] = (geoMap[region] || 0) + val; }); 
        const geoDiversification = Object.keys(geoMap).map(k => ({ label: k, value: geoMap[k] })).sort((a,b) => b.value - a.value); 
        const events = activeFilteredPortfolio.map(p => { const isSold = !!p.sellDate; const date = isSold ? p.sellDate : p.buyDate; const cost = (p.buyPrice * p.shares * p.buyFx) + (p.feesIncludedInPrice ? 0 : (p.fees || 0)) + (p.adjustments || 0); const curP = isSold ? p.sellPrice : (p.isIndex ? p.currentPrice / (p.indexDivisor||1) : p.currentPrice); const curF = isSold ? p.sellFx : (p.isIndex ? p.buyFx : p.currentFx); const value = isSold ? (((p.sellPrice * p.shares * p.sellFx) - (p.sellFeesIncludedInPrice ? 0 : (p.sellFees || 0)) - (p.sellAdjustments || 0)) - cost) : ((curP * p.shares * curF) - cost); return { date, value, cost, label: p.ticker }; }).sort((a,b) => new Date(a.date) - new Date(b.date)); 
        let accVal = 0; let accCost = 0; 
        const evolution = events.map(e => { accVal += e.value; accCost += e.cost; const roi = accCost !== 0 ? ((accVal) / accCost) * 100 : 0; return { label: e.date, value: accVal, extraPct: r2(roi) }; }); 
        return { weightsData, geoDiversification, evolution };

    const divergingData = useMemo(() => { return activeFilteredPortfolio.map(p => { const cost = (p.buyPrice * p.shares * p.buyFx) + (p.feesIncludedInPrice ? 0 : (p.fees || 0)) + (p.adjustments || 0); const isS = !!p.sellDate; const curP = isS ? p.sellPrice : (p.isIndex ? p.currentPrice/p.indexDivisor : p.currentPrice); const curF = isS ? p.sellFx : p.currentFx; const val = (curP * p.shares * curF) - (isS ? (p.sellFeesIncludedInPrice ? 0 : (p.sellFees || 0)) + (p.sellAdjustments || 0) : 0); const pl = val - cost; const pct = cost !== 0 ? (pl/cost)*100 : 0; return { ticker: p.ticker, shares: p.shares, dates: `${formatDateES(p.buyDate)}${isS ? ' → '+formatDateES(p.sellDate) : ''}`, value: pl, pct: pct }; }).sort((a,b) => b.value - a.value); }, [activeFilteredPortfolio]);
    const taxSum = useMemo(() => { if(!resultsData) return 0; return Object.values(resultsData).reduce((acc, y) => acc + (y.tax || 0), 0); }, [resultsData]);

    useEffect(() => { 
    if (!isAppReady) return;
    const now = Date.now();
    const last = lastUpdate ? new Date(lastUpdate).getTime() : 0;
    const intervalMs = (refreshInterval || 10) * 60 * 1000;

                const fxData = batchData[fxKey];

                if (stockData && stockData.success && stockData.p) {
                    updatesMap[item.id] = {
                        currentPrice: cleanVal(stockData.p),
                        currentPE: stockData.pe ? cleanVal(stockData.pe) : item.currentPE,
                        previousClose: stockData.pc ? cleanVal(stockData.pc) : item.previousClose,
                        quoteDate: stockData.dt || "" // GUARDAMOS LA FECHA DE LA COTIZACIÓN
                    };
                    if (item.stockCurrency === baseCurrency) {
                        updatesMap[item.id].currentFx = 1;
                    } else if (fxData && fxData.success) {
                        updatesMap[item.id].currentFx = cleanVal(fxData.p);
                    }
                } else {
                    const reason = stockData ? (stockData.reason || "Sin datos") : "No encontrado";
                    totallyFailed.push(`${item.ticker} (${reason})`);
                }
            });        
        }

        setUpdateProgress(60);

        // 2. ACTUALIZAR FONDOS (ISIN) CON GEMINI EN BLOQUE
        if (isinItems.length > 0 && apiKey) {
            setUpdateText('Consultando iA (Fondos)...');
            const isinList = isinItems.map(p => p.ticker).join(", ");
            const prompt = `Actúa como API financiera. Devuelve el valor liquidativo actual (NAV) de los siguientes fondos de inversión identificados por su ISIN: ${isinList}. Responde SOLO con un JSON usando el ISIN como clave. Estructura: {"ISIN_A": {"p": precio_numero}, "ISIN_B": {"p": precio_numero}}. USA PUNTO DECIMAL.`;
            
            try {
                const aiRes = await askGemini(apiKey, prompt, aiModel);
                const json = extractJSON(aiRes);
                if (json) {
                    isinItems.forEach(item => {
                        if (json[item.ticker] && json[item.ticker].p) {
                            updatesMap[item.id] = { currentPrice: cleanVal(json[item.ticker].p) };
                        } else {
                            totallyFailed.push(`${item.ticker} (iA: Valor no encontrado)`);
                        }
                    });
                }
            } catch (aiErr) {
                console.error("Error ISIN:", aiErr);
                totallyFailed.push(`Fallo general actualizando Fondos ISIN.`);
            }
        }

        setUpdateProgress(90);

        // 3. APLICACIÓN DE CAMBIOS
        if (Object.keys(updatesMap).length > 0) {
            setPortfolio(prev => prev.map(p => updatesMap[p.id] ? { ...p, ...updatesMap[p.id] } : p));
            setLastUpdate(new Date().toISOString());
        }

        if (!isAuto && totallyFailed.length > 0) {
            setInfoModal({ 
                isOpen: true, 
                title: 'Precios no encontrados', 
                msg: `Fallo la actualización de estos valores:\n\n${totallyFailed.join('\n')}`, 
                type: 'warning' 
            });
        }

    } catch (e) {
        if (!isAuto) setInfoModal({ isOpen: true, title: 'Fallo de Conexión', msg: e.message, type: 'error' });
    } finally {
        setUpdateProgress(100);
        setUpdateText('Completado');
        setTimeout(() => { setUpdating(false); setUpdateProgress(0); setUpdateText(''); }, 1000);
    }

        printWindow.document.write(`
            <html><head><title>Grafo de Interdependencias (Nivel 2) - ${data.center.ticker}</title>
            <style>body{margin:0; background:#0f172a; color:#fff; font-family:sans-serif; text-align:center;} img{max-width:100%; height:auto; margin-top: 10px; border: 1px solid #334155; border-radius: 8px;} h2{color:#60a5fa; margin-top:20px; font-family: monospace; letter-spacing: 2px;}</style>
            </head><body>
            <h2>RED ESTRUCTURAL NIVEL 2: ${data.center.ticker}</h2>
            <p style="font-size:11px; color:#94a3b8; margin-bottom:20px;">Nodos interconectados a 2 niveles de profundidad. Tamaño = Nivel de Dependencia.</p>
            <img src="${dataUrl}" />
            </body></html>
        `);
        printWindow.document.close();
        setTimeout(() => { printWindow.focus(); printWindow.print(); }, 500);
    };

    useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        let animationFrameId;

        const resize = () => { canvas.width = canvas.parentElement.clientWidth; canvas.height = canvas.parentElement.clientHeight; };
        resize();
        window.addEventListener('resize', resize);

        const W = canvas.width;
        const H = canvas.height;

        // Mapeo para evitar duplicados y crear un GRAFO REAL, no un árbol
        const nodesMap = new Map();
        const linksArr = [];

        const addNode = (info, type, level, initX, initY) => {
            const key = info.ticker !== 'N/A' ? info.ticker : info.name;
            if (!nodesMap.has(key)) {
                const w = parseInt(info.weight) || 50;
                // Radios según nivel para no saturar la pantalla
                const baseR = level === 0 ? 45 : (level === 1 ? 15 + (w/100)*35 : 8 + (w/100)*15);
                const color = level === 0 ? '#3b82f6' : (type.includes('supplier') ? '#f59e0b' : '#10b981');
                
                nodesMap.set(key, {
                    id: key, info: info, x: initX + (Math.random()*40-20), y: initY + (Math.random()*40-20), 
                    vx: 0, vy: 0, r: baseR, type: level === 0 ? 'center' : type, 
                    color: color, mass: Math.max(2, baseR/8), level: level
                });
            }
            return nodesMap.get(key);
        };

        // 1. Nodo Central
        const centerNode = addNode(data.center, 'center', 0, W/2, H/2);

        // 2. Procesar Proveedores y sus sub-niveles
        (data.suppliers || []).forEach((sup, i) => {
            const supNode = addNode(sup, 'supplier', 1, W/3, H/2 + (i*100 - 150));
            linksArr.push({ source: supNode, target: centerNode, type: 'supply' });
            
            (sup.suppliers || []).forEach((subSup, j) => {
                const subNode = addNode(subSup, 'supplier', 2, W/5, H/2 + (j*80 - 100));
                linksArr.push({ source: subNode, target: supNode, type: 'supply' });
            });
            
            (sup.clients || []).forEach((subCli, j) => {
                const subNode = addNode(subCli, 'client', 2, W/2, H/4); 
                if (subNode.id !== centerNode.id) linksArr.push({ source: supNode, target: subNode, type: 'consume' });
            });
        });

        // 3. Procesar Clientes y sus sub-niveles
        (data.clients || []).forEach((cli, i) => {
            const cliNode = addNode(cli, 'client', 1, 2*W/3, H/2 + (i*100 - 150));
            linksArr.push({ source: centerNode, target: cliNode, type: 'consume' });
            
            (cli.suppliers || []).forEach((subSup, j) => {
                const subNode = addNode(subSup, 'supplier', 2, W/2, 3*H/4);
                if (subNode.id !== centerNode.id) linksArr.push({ source: subNode, target: cliNode, type: 'supply' });
            });
            
            (cli.clients || []).forEach((subCli, j) => {
                const subNode = addNode(subCli, 'client', 2, 4*W/5, H/2 + (j*80 - 100));
                linksArr.push({ source: cliNode, target: subNode, type: 'consume' });
            });
        });

        const nodes = Array.from(nodesMap.values());
        const links = linksArr;
        const particles = [];

        links.forEach(link => {
            // Menos partículas para enlaces de nivel 2 para no saturar visualmente
            const isL2 = link.source.level === 2 || link.target.level === 2;
            const numP = isL2 ? 1 : 3;
            for(let i=0; i<numP; i++) {
                particles.push({ link, progress: Math.random(), speed: 0.002 + Math.random()*0.003 });
            }
        });

        let draggedNode = null;
        let hoverNode = null;

        const getPos = (e) => {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches && e.touches.length > 0 ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches && e.touches.length > 0 ? e.touches[0].clientY : e.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top, rawX: clientX, rawY: clientY };
        };

        const onStart = (e) => {
            const pos = getPos(e);
            draggedNode = nodes.find(n => Math.hypot(n.x - pos.x, n.y - pos.y) < n.r + 15);
        };

        const onMove = (e) => {
            const pos = getPos(e);
            if (draggedNode) {
                if (e.cancelable) e.preventDefault(); 
                draggedNode.x = pos.x; draggedNode.y = pos.y;
            } else {
                hoverNode = nodes.find(n => Math.hypot(n.x - pos.x, n.y - pos.y) < n.r + 5);
                if (hoverNode) {
                    setTooltip({ x: pos.rawX, y: pos.rawY, info: hoverNode.info, type: hoverNode.type, level: hoverNode.level, weight: hoverNode.info.weight });
                    canvas.style.cursor = 'pointer';
                } else {
                    setTooltip(null); canvas.style.cursor = 'grab';
                }
            }
        };

        const onEnd = () => { draggedNode = null; };

        canvas.onmousedown = onStart; canvas.onmousemove = onMove; canvas.onmouseup = onEnd; canvas.onmouseout = () => { onEnd(); setTooltip(null); };
        canvas.addEventListener('touchstart', onStart, {passive: false}); canvas.addEventListener('touchmove', onMove, {passive: false});
        canvas.addEventListener('touchend', onEnd); canvas.addEventListener('touchcancel', onEnd);

        const render = () => {
            ctx.clearRect(0, 0, W, H);
            const k = 0.015; // Muelle más suave
            const rep = 8000; // Repulsión fuerte
            const damping = 0.85; 

            // Físicas: Repulsión
            for (let i = 0; i < nodes.length; i++) {
                for (let j = i + 1; j < nodes.length; j++) {
                    const dx = nodes[j].x - nodes[i].x; const dy = nodes[j].y - nodes[i].y;
                    let dist = Math.hypot(dx, dy) || 1;
                    const force = rep / (dist * dist);
                    const fx = (dx / dist) * force; const fy = (dy / dist) * force;
                    if (nodes[i] !== draggedNode) { nodes[i].vx -= fx / nodes[i].mass; nodes[i].vy -= fy / nodes[i].mass; }
                    if (nodes[j] !== draggedNode) { nodes[j].vx += fx / nodes[j].mass; nodes[j].vy += fy / nodes[j].mass; }
                }
            }

            // Físicas: Atracción Enlaces
            links.forEach(link => {
                const dx = link.target.x - link.source.x; const dy = link.target.y - link.source.y;
                const dist = Math.hypot(dx, dy) || 1;
                const isL2 = link.source.level === 2 || link.target.level === 2;
                const targetDist = isL2 ? 150 : 250;
                
                const force = (dist - targetDist) * k;
                const fx = (dx / dist) * force; const fy = (dy / dist) * force;
                if (link.source !== draggedNode) { link.source.vx += fx / link.source.mass; link.source.vy += fy / link.source.mass; }
                if (link.target !== draggedNode) { link.target.vx -= fx / link.target.mass; link.target.vy -= fy / link.target.mass; }
            });

            // Físicas: Fricción y Límites
            nodes.forEach(n => {
                if (n !== draggedNode) {
                    if (n.type === 'center') { n.vx += (W/2 - n.x) * 0.05; n.vy += (H/2 - n.y) * 0.05; } 
                    n.vx *= damping; n.vy *= damping;
                    n.x += n.vx; n.y += n.vy;
                    n.x = Math.max(n.r, Math.min(W - n.r, n.x)); n.y = Math.max(n.r, Math.min(H - n.r, n.y));
                }
            });

            // DIBUJAR ENLACES (Corregido para visibilidad)
            links.forEach(link => {
                ctx.beginPath(); 
                ctx.moveTo(link.source.x, link.source.y); 
                ctx.lineTo(link.target.x, link.target.y);
                
                const isL2 = link.source.level === 2 || link.target.level === 2;
                
                // Nivel 1 más grueso, Nivel 2 más fino pero con opacidad alta para que se vea
                ctx.strokeStyle = isL2 ? "rgba(255, 255, 255, 0.25)" : "rgba(255, 255, 255, 0.5)"; 
                ctx.lineWidth = isL2 ? 1.5 : 2.5; 
                
                // Nivel 2 línea punteada
                if (isL2) {
                    ctx.setLineDash([5, 5]); 
                } else {
                    ctx.setLineDash([]); 
                }
                
                ctx.stroke();
                ctx.setLineDash([]); // Resetear pincel siempre al final
            });

            // DIBUJAR FLUJOS (Partículas con Glow)
            particles.forEach(p => {
                p.progress += p.speed; 
                if (p.progress > 1) p.progress = 0;
                
                const x = p.link.source.x + (p.link.target.x - p.link.source.x) * p.progress;
                const y = p.link.source.y + (p.link.target.y - p.link.source.y) * p.progress;
                
                const isL2 = p.link.source.level === 2 || p.link.target.level === 2;
                
                ctx.beginPath(); 
                ctx.arc(x, y, isL2 ? 2 : 3.5, 0, Math.PI * 2);
                
                ctx.fillStyle = p.link.type === 'supply' ? '#fcd34d' : '#6ee7b7';
                ctx.fill(); 
                
                // Glow Effect
                ctx.shadowBlur = isL2 ? 5 : 12; 
                ctx.shadowColor = ctx.fillStyle; 
                ctx.fill(); 
                ctx.shadowBlur = 0; // Resetear glow
            });

            // DIBUJAR NODOS
            nodes.forEach(n => {
                ctx.beginPath(); ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
                ctx.fillStyle = '#0f172a'; ctx.fill();
                ctx.lineWidth = n === hoverNode ? 4 : (n.level === 2 ? 1.5 : 2.5); 
                ctx.strokeStyle = n.color; ctx.stroke();
                
                ctx.fillStyle = n.level === 2 ? '#cbd5e1' : '#fff'; 
                const fontSize = n.type === 'center' ? 14 : Math.max(8, Math.min(12, n.r/2.2));
                ctx.font = `${n.level===2?'normal':'bold'} ${fontSize}px sans-serif`;
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                const label = n.info.ticker !== 'N/A' ? n.info.ticker : n.info.name.substring(0,8);
                ctx.fillText(label, n.x, n.y);
            });

            animationFrameId = requestAnimationFrame(render);
        };
        render();

        return () => { 
            cancelAnimationFrame(animationFrameId); 
            window.removeEventListener('resize', resize); 
            if (canvas) {
                canvas.removeEventListener('touchstart', onStart);
                canvas.removeEventListener('touchmove', onMove);
                canvas.removeEventListener('touchend', onEnd);
                canvas.removeEventListener('touchcancel', onEnd);
            }
        };
    }, [data]);

    return (
        <div className="fixed inset-0 z-[500] bg-black flex flex-col fade-in">
            <div className="flex justify-between items-center p-4 bg-slate-900 border-b border-slate-800 shrink-0">
                <div>
                    <h2 className="text-xl font-bold text-blue-400 font-display flex items-center gap-3"><Icons.Network size={24}/> GRAFO DE INTERDEPENDENCIAS (NIVEL 2): {data.center.ticker}</h2>
                    <p className="text-xs text-slate-400 mt-1 hidden sm:block">Físicas de red neuronal. Líneas punteadas indican Nivel 2. Tamaño = Nivel de Dependencia.</p>
                </div>
                <div className="flex gap-3">
                    <button onClick={handlePrint} className="bg-slate-700 hover:bg-slate-600 text-white px-4 py-2 rounded-lg font-bold text-xs flex items-center gap-2"><Icons.ExternalLink size={16}/> IMPRIMIR GRAFO</button>
                    <button onClick={onClose} className="bg-red-600 hover:bg-red-500 text-white px-4 py-2 rounded-lg font-bold text-xs flex items-center gap-2"><Icons.X size={16}/> CERRAR</button>
                </div>
            </div>
            <div className="flex-1 relative overflow-hidden" style={{ cursor: 'grab', touchAction: 'none' }}>
                <canvas ref={canvasRef} className="w-full h-full block"></canvas>
                
                {tooltip && (
                    <div className="absolute z-10 bg-slate-800/90 border border-slate-600 p-3 rounded-xl shadow-2xl backdrop-blur-md pointer-events-none transform -translate-x-1/2 -translate-y-[120%]" 
                         style={{ left: tooltip.x, top: tooltip.y, minWidth: '200px' }}>
                        <div className={`text-[10px] font-black uppercase mb-1 ${tooltip.type === 'center' ? 'text-blue-400' : tooltip.type === 'supplier' ? 'text-orange-400' : 'text-green-400'}`}>
                            {tooltip.type === 'center' ? 'OBJETIVO PRINCIPAL' : tooltip.type === 'supplier' ? 'PROVEEDOR' : 'CLIENTE'} 
                            {tooltip.level > 0 && ` (Nivel ${tooltip.level})`}
                        </div>
                        <div className="font-bold text-white text-sm">{tooltip.info.name}</div>
                        <div className="text-xs text-slate-300 font-mono mt-1">Ticker: {tooltip.info.ticker}</div>
                        <div className="text-xs text-slate-400 mt-0.5">País: {tooltip.info.country}</div>
                        {tooltip.weight && <div className="mt-2 pt-2 border-t border-slate-600 text-[10px] text-slate-300">Índice de Dependencia: <b className="text-white">{tooltip.weight}/100</b></div>}
                    </div>
                )}
            </div>
        </div>
    );
};

            DATOS DE ENTRADA USUARIO:
            - Inversión Inicial (Teórica o Real): ${projForm.shares} acciones compradas a ${projForm.buyPrice} (Divisa Local).
            - Horizonte Temporal: ${projForm.years} años.
            
            INSTRUCCIONES DE BÚSQUEDA ACTIVA (INTERNET):
            1. Busca el PRECIO ACTUAL, EPS (BPA) TTM, Tasa de Crecimiento estimada (CAGR 5y) y Dividend Yield actual.
            2. Busca el PER (P/E) Actual y el PER Medio Histórico (5 años).

            CÁLCULOS A REALIZAR (Muestra la lógica):
            Genera 3 Escenarios (PESIMISTA, PROBABLE, OPTIMISTA) variando el Crecimiento de Beneficios y el Múltiplo PER futuro.
            
            Para cada escenario calcula:
            A. Precio Futuro Acción = EPS_Actual * (1 + Crecimiento)^n * PER_Futuro.
            B. Valor Final Posición = Precio Futuro * ${projForm.shares}.
            C. Dividendos Acumulados = Estima la suma total de dividendos cobrados en ${projForm.years} años (asume reinversión o suma simple, indícalo).
            D. Retorno Total = (Valor Final + Dividendos) - (Inversión Inicial: ${projForm.shares * projForm.buyPrice}).
            E. Rentabilidad Simple % = (Retorno Total / Inversión Inicial) * 100.
            F. Rentabilidad Anualizada (CAGR) % = ((Valor Final + Divs) / Inversión Inicial)^(1/n) - 1.
            G. Rentabilidad respecto al índice de referencia de la acción.

            FORMATO DE SALIDA (HTML LIMPIO, TEXTO NEGRO, FONDO BLANCO):
            Usa tablas HTML para presentar los 3 escenarios comparados.
            Incluye una sección de "Cálculos Intermedios" explicando qué tasa de crecimiento y PER has usado para cada escenario.
            
            ESTRUCTURA HTML REQUERIDA:
            <div style="background:#fff; color:#000; padding:10px;">

                <h3 style="color:#0ea5e9; border-bottom:1px solid #ccc; margin-top:20px;">2. FUNDAMENTOS Y SUPUESTOS UTILIZADOS</h3>
                [Explicación de EPS base, tasas de crecimiento aplicadas en cada caso y expansión/contracción de PER]

                <div style="background:#f0f9ff; border:1px solid #0ea5e9; padding:10px; margin-top:20px; border-radius:8px;">
                    <strong>CONCLUSIÓN DEL ANALISTA:</strong> [Opinión sobre si la entrada a ${projForm.buyPrice} ofrece un margen de seguridad suficiente basado en el escenario Probable].
                </div>
            </div>
            `;

            const res = await askGemini(apiKey, prompt, aiModel);
            
            // Limpieza básica
            let cleanHtml = res.trim().replace(/```html/g, '').replace(/```/g, '');
            const startIdx = cleanHtml.indexOf('<');
            if (startIdx !== -1) cleanHtml = cleanHtml.substring(startIdx);

            setSpecificAnswer(cleanHtml);

        } catch (e) {
            setStatusModal({ isOpen: true, title: 'Error Proyección', msg: e.message, type: 'error' });
        } finally {
            setLoading(false);
        }
