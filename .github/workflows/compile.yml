name: Compilador de React Automático 

on:
  push:
    branches:
      - main
    paths:
      - 'BOLSA2.HTML'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Instalar Babel y dependencias
        run: npm install @babel/core @babel/preset-react @babel/preset-env

      - name: Crear script de compilacion
        run: |
          cat << 'EOF' > compile.js
          const fs = require('fs');
          const babel = require('@babel/core');

          const inputFile = 'BOLSA2.HTML';
          const outputFile = 'BOLSA.HTML';

          try {
            let html = fs.readFileSync(inputFile, 'utf8');
            
            console.log('📄 HTML original cargado. Buscando bloque React...');
            
            // Buscar el bloque de React con id="react-app"
            const reactScriptRegex = /<script\s+[^>]*id="react-app"[^>]*>([\s\S]*?)<\/script>/i;
            const match = html.match(reactScriptRegex);

            if (!match) {
              console.error('❌ No se encontró bloque con id="react-app"');
              process.exit(1);
            }

            console.log('✅ Bloque React encontrado');
            const jsxCode = match[1];

            // Compilar JSX con Babel
            console.log('🔄 Compilando JSX...');
            const compiled = babel.transformSync(jsxCode, {
              presets: [
                ['@babel/preset-react', { runtime: 'automatic' }],
                ['@babel/preset-env', { 
                  targets: { esmodules: true },
                  modules: false 
                }]
              ]
            }).code;

            console.log('✅ Compilación exitosa');

            // Envolver en DOMContentLoaded
            const wrappedCode = `
          window.addEventListener('DOMContentLoaded', () => {
            try {
          ${compiled}
            } catch (err) {
              console.error("❌ Error ejecutando React:", err);
              if (typeof eruda !== 'undefined') {
                eruda.init();
                eruda.show();
              }
            }
          });
            `;

            // Reemplazar SOLO el script del react-app, mantener todo lo demás
            html = html.replace(reactScriptRegex, () => '<script>\n' + wrappedCode + '\n</script>');

            console.log('✅ Código compilado insertado');

            // Eliminar el script de auto-compilación que estaba al final
            // Este script buscaba un elemento con id="react-app" y lo transpilaba en el navegador
            // Ya no lo necesitamos porque precompilamos
            const autoCompileRegex = /<script>\s*window\.addEventListener\('DOMContentLoaded'[\s\S]*?Babel\.transform[\s\S]*?<\/script>/;
            const beforeLength = html.length;
            html = html.replace(autoCompileRegex, '');
            const afterLength = html.length;
            
            if (beforeLength !== afterLength) {
              console.log('✅ Script de auto-compilación removido');
            }

            // Eliminar Babel Standalone ya que no lo necesitamos en runtime
            html = html.replace(/<script\s+[^>]*src="[^"]*babel\.min\.js"[^>]*><\/script>/gi, '');
            console.log('✅ Babel Standalone removido');

            // Eliminar la inicialización de window.Babel
            html = html.replace(/<script>\s*window\.Babel\s*=\s*\{[\s\S]*?\};\s*<\/script>/gi, '');
            console.log('✅ Inicialización de Babel removida');

            // MANTENER React y ReactDOM - son esenciales
            // No eliminar nada más

            fs.writeFileSync(outputFile, html);
            console.log('\n✅ COMPILACIÓN COMPLETADA');
            console.log(`   Entrada: ${inputFile}`);
            console.log(`   Salida: ${outputFile}`);
            console.log(`   Tamaño: ${(html.length / 1024).toFixed(2)} KB`);

          } catch (err) {
            console.error('❌ Error:', err.message);
            console.error(err.stack);
            process.exit(1);
          }
          EOF

      - name: Ejecutar compilacion
        run: node compile.js

      - name: Verificar que BOLSA.HTML tiene contenido
        run: |
          SIZE=$(wc -c < BOLSA.HTML)
          echo "Tamaño de BOLSA.HTML: $SIZE bytes"
          if [ $SIZE -lt 10000 ]; then
            echo "❌ ADVERTENCIA: BOLSA.HTML parece vacío o muy pequeño"
            head -c 500 BOLSA.HTML
            exit 1
          fi
          echo "✅ BOLSA.HTML parece correcto"

      - name: Guardar y subir BOLSA.HTML
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add BOLSA.HTML
          git commit -m "style: precompilar React automáticamente" || echo "Sin cambios"
          git push
