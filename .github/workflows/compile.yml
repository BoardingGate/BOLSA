name: Compilador de React Automático 

on:
  push:
    branches:
      - main
    paths:
      - 'BOLSA2.HTML'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Instalar Babel y dependencias
        run: npm install @babel/core @babel/preset-react @babel/preset-env

      - name: Crear script de compilacion
        run: |
          cat << 'EOF' > compile.js
          const fs = require('fs');
          const babel = require('@babel/core');

          const inputFile = 'BOLSA2.HTML';
          const outputFile = 'BOLSA.HTML';

          try {
            let html = fs.readFileSync(inputFile, 'utf8');
            
            console.log('📄 HTML original cargado');
            console.log(`   Tamaño: ${(html.length / 1024).toFixed(2)} KB`);
            
            // Buscar el inicio del App component
            const appStartPattern = 'const App = () => {';
            const appStartIndex = html.indexOf(appStartPattern);
            
            if (appStartIndex === -1) {
              console.error('❌ No se encontró "const App = () => {"');
              process.exit(1);
            }
            
            console.log('✅ Encontrado inicio del componente App');

            // Encontrar el render del App
            const createRootPattern = "createRoot(document.getElementById('root')).render(<App />);";
            const createRootIndex = html.indexOf(createRootPattern, appStartIndex);
            
            if (createRootIndex === -1) {
              console.error('❌ No se encontró createRoot render');
              process.exit(1);
            }
            
            console.log('✅ Encontrado createRoot render');

            // Encontrar los tags <script>
            let scriptOpenIndex = html.lastIndexOf('<script', appStartIndex);
            let scriptOpenEnd = html.indexOf('>', scriptOpenIndex) + 1;
            let scriptCloseIndex = html.indexOf('</script>', createRootIndex);
            
            const fullJsxCode = html.substring(scriptOpenEnd, scriptCloseIndex);
            
            console.log(`✅ JSX extraído: ${fullJsxCode.length} caracteres`);
            console.log('🔄 Compilando JSX con Babel...');

            // Compilar
            let compiled;
            try {
              compiled = babel.transformSync(fullJsxCode, {
                presets: [
                  ['@babel/preset-react', { runtime: 'automatic' }],
                  ['@babel/preset-env', { 
                    targets: { esmodules: true },
                    modules: false 
                  }]
                ]
              }).code;
              console.log('✅ Compilación exitosa');
              console.log(`   Código compilado: ${compiled.length} caracteres`);
            } catch (babelErr) {
              console.error('❌ Error en compilación Babel:');
              console.error('   ' + babelErr.message);
              if (babelErr.loc) {
                console.error(`   Línea: ${babelErr.loc.line}, Columna: ${babelErr.loc.column}`);
              }
              process.exit(1);
            }

            // Envolver el código compilado
            const wrappedCode = `
          window.addEventListener('DOMContentLoaded', () => {
            try {
          ${compiled}
            } catch (err) {
              console.error("❌ Error ejecutando React:", err);
              if (typeof eruda !== 'undefined') {
                eruda.init();
                eruda.show();
              }
            }
          });
            `;

            // Reemplazar el script original
            html = html.substring(0, scriptOpenIndex) + 
                   '<script>\n' + wrappedCode + '\n</script>' +
                   html.substring(scriptCloseIndex + '</script>'.length);

            console.log('✅ Script React compilado e insertado');

            // Eliminar el script de transpilación en runtime
            const runtimeCompileRegex = /<script>\s*window\.addEventListener\('DOMContentLoaded'[\s\S]*?Babel\.transform[\s\S]*?<\/script>/;
            const beforeSize = html.length;
            html = html.replace(runtimeCompileRegex, '');
            if (html.length < beforeSize) {
              console.log('✅ Script de transpilación en runtime removido');
            }

            // Eliminar Babel Standalone
            html = html.replace(/<script\s+[^>]*src="[^"]*babel\.min\.js"[^>]*><\/script>/gi, '');
            console.log('✅ Babel Standalone removido');

            // Eliminar inicialización de window.Babel
            html = html.replace(/<script>\s*window\.Babel\s*=\s*\{[^}]*\};\s*<\/script>/gi, '');
            console.log('✅ Inicialización de Babel removida');

            // Guardar
            fs.writeFileSync(outputFile, html);
            
            console.log('\n' + '='.repeat(60));
            console.log('✅ COMPILACIÓN COMPLETADA EXITOSAMENTE');
            console.log('='.repeat(60));
            const inputSize = fs.readFileSync(inputFile).length;
            const outputSize = html.length;
            console.log(`📝 Entrada:  ${(inputSize / 1024 / 1024).toFixed(2)} MB`);
            console.log(`📝 Salida:   ${(outputSize / 1024 / 1024).toFixed(2)} MB`);
            console.log('='.repeat(60));

          } catch (err) {
            console.error('\n❌ ERROR FATAL:');
            console.error(err.message);
            if (err.stack) {
              console.error(err.stack);
            }
            process.exit(1);
          }
          EOF

      - name: Ejecutar compilacion
        run: node compile.js

      - name: Verificar tamaño de BOLSA.HTML
        run: |
          if [ -f BOLSA.HTML ]; then
            SIZE=$(stat -f%z BOLSA.HTML 2>/dev/null || stat -c%s BOLSA.HTML 2>/dev/null)
            SIZE_MB=$(echo "scale=2; $SIZE / 1024 / 1024" | bc)
            echo "✅ BOLSA.HTML generado correctamente"
            echo "   Tamaño: $SIZE_MB MB"
          else
            echo "❌ BOLSA.HTML no existe"
            exit 1
          fi

      - name: Guardar y subir BOLSA.HTML
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add BOLSA.HTML
          git commit -m "style: precompilar React automáticamente" || echo "⚠️ Sin cambios que guardar"
          git push
