name: Compilador de React Automático 

on:
  push:
    branches:
      - main
    paths:
      - 'BOLSA2.HTML'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Instalar Babel y dependencias
        run: npm install @babel/core @babel/preset-react @babel/preset-env

      - name: Crear script de compilacion
        run: |
          cat << 'EOF' > compile.js
          const fs = require('fs');
          const babel = require('@babel/core');

          const inputFile = 'BOLSA2.HTML';
          const outputFile = 'BOLSA.HTML';

          try {
            console.log('📄 Leyendo BOLSA2.HTML...');
            let html = fs.readFileSync(inputFile, 'utf8');
            
            const inputSize = html.length;
            console.log(`   Tamaño: ${(inputSize / 1024 / 1024).toFixed(2)} MB`);
            
            // PASO 1: Encontrar TODOS los bloques <script> que contienen código React
            // Buscar desde el más largo hasta el más corto para asegurar que cogemos el principal
            const scriptRegex = /<script[^>]*>([\s\S]*?)<\/script>/gi;
            const scripts = [];
            let match;
            
            while ((match = scriptRegex.exec(html)) !== null) {
              const content = match[1];
              // Buscar scripts que contengan código React (no los que cargan librerías externas)
              if (content.includes('const App = ') || 
                  content.includes('function App(') ||
                  content.includes('createRoot') && content.includes('const')) {
                scripts.push({
                  fullMatch: match[0],
                  content: content,
                  length: content.length,
                  index: match.index
                });
              }
            }
            
            if (scripts.length === 0) {
              console.error('❌ No se encontró ningún script con código React');
              console.error('   Se buscaba: "const App" o "function App" o "createRoot"');
              process.exit(1);
            }

            // Ordenar por longitud (el más largo es probablemente el principal)
            scripts.sort((a, b) => b.length - a.length);
            
            const mainScript = scripts[0];
            console.log(`✅ Encontrado script React principal`);
            console.log(`   Tamaño del código: ${(mainScript.length / 1024).toFixed(2)} KB`);
            console.log(`   Número de scripts React encontrados: ${scripts.length}`);

            // PASO 2: Compilar el código React principal
            console.log('🔄 Compilando con Babel (runtime: automatic)...');
            let compiled;
            try {
              compiled = babel.transformSync(mainScript.content, {
                presets: [
                  ['@babel/preset-react', { runtime: 'automatic' }],
                  ['@babel/preset-env', { 
                    targets: { esmodules: true },
                    modules: false 
                  }]
                ]
              }).code;
              console.log('✅ Compilación exitosa');
              console.log(`   Código compilado: ${(compiled.length / 1024).toFixed(2)} KB`);
            } catch (babelErr) {
              console.error('❌ Error en Babel:');
              console.error('   Mensaje: ' + babelErr.message);
              if (babelErr.loc) {
                console.error(`   Ubicación: Línea ${babelErr.loc.line}, Columna ${babelErr.loc.column}`);
              }
              process.exit(1);
            }

            // PASO 3: Envolver el código compilado
            const wrappedCode = `
          window.addEventListener('DOMContentLoaded', () => {
            try {
          ${compiled}
            } catch (err) {
              console.error("❌ Error ejecutando la aplicación:", err);
              if (typeof eruda !== 'undefined' && eruda) {
                eruda.init();
                eruda.show();
              }
            }
          });
            `;

            // PASO 4: Reemplazar el script original en el HTML
            html = html.replace(mainScript.fullMatch, `<script>\n${wrappedCode}\n</script>`);
            console.log('✅ Script compilado insertado en HTML');

            // PASO 5: Limpiar scripts innecesarios
            // Eliminar Babel Standalone (ya no lo necesitamos)
            let cleanups = 0;
            
            // Babel Standalone
            const beforeBabel = html.length;
            html = html.replace(/<script\s+[^>]*src="[^"]*babel\.min\.js"[^>]*><\/script>/gi, '');
            if (html.length < beforeBabel) {
              console.log('✅ Babel Standalone removido');
              cleanups++;
            }

            // window.Babel config
            const beforeBabelConfig = html.length;
            html = html.replace(/<script>\s*window\.Babel\s*=\s*\{[^}]*\};\s*<\/script>/gi, '');
            if (html.length < beforeBabelConfig) {
              console.log('✅ Configuración de Babel removida');
              cleanups++;
            }

            // Scripts de transpilación en runtime (que buscan elemento con id="react-app")
            const beforeRuntime = html.length;
            html = html.replace(/<script>\s*window\.addEventListener\('DOMContentLoaded'[\s\S]*?document\.getElementById\('react-app'\)[\s\S]*?<\/script>/gi, '');
            if (html.length < beforeRuntime) {
              console.log('✅ Script de transpilación en runtime removido');
              cleanups++;
            }

            console.log(`   Total de limpiezas: ${cleanups}`);

            // PASO 6: Guardar el archivo compilado
            fs.writeFileSync(outputFile, html);
            
            const outputSize = html.length;
            console.log('\n' + '='.repeat(60));
            console.log('✅ COMPILACIÓN COMPLETADA');
            console.log('='.repeat(60));
            console.log(`📝 Entrada:  BOLSA2.HTML (${(inputSize / 1024 / 1024).toFixed(2)} MB)`);
            console.log(`📝 Salida:   BOLSA.HTML  (${(outputSize / 1024 / 1024).toFixed(2)} MB)`);
            console.log(`📊 Reducción: ${(((inputSize - outputSize) / inputSize) * 100).toFixed(1)}%`);
            console.log('='.repeat(60));

          } catch (err) {
            console.error('\n❌ ERROR FATAL:');
            console.error(err.message);
            if (err.stack) {
              console.error(err.stack);
            }
            process.exit(1);
          }
          EOF

      - name: Ejecutar compilacion
        run: node compile.js

      - name: Verificar BOLSA.HTML
        run: |
          echo "🔍 Verificando archivo generado..."
          if [ ! -f BOLSA.HTML ]; then
            echo "❌ BOLSA.HTML no fue creado"
            exit 1
          fi
          
          SIZE=$(wc -c < BOLSA.HTML)
          SIZE_MB=$(echo "scale=2; $SIZE / 1024 / 1024" | bc)
          
          echo "✅ BOLSA.HTML existe"
          echo "   Tamaño: $SIZE_MB MB"
          
          if [ $SIZE -lt 1000000 ]; then
            echo "⚠️  ADVERTENCIA: Archivo muy pequeño (< 1 MB)"
            echo "   Primeros 300 caracteres:"
            head -c 300 BOLSA.HTML
          fi

      - name: Guardar y subir BOLSA.HTML
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add BOLSA.HTML
          git commit -m "style: precompilar React automáticamente" || echo "⚠️ Sin cambios"
          git push
