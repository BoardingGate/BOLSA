name: Compilador de React Automático 

on:
  push:
    branches:
      - main
    paths:
      - 'BOLSA2.HTML'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Instalar Babel y dependencias
        run: npm install @babel/core @babel/preset-react @babel/preset-env

      - name: Crear script de compilacion
        run: |
          cat << 'EOF' > compile.js
          const fs = require('fs');
          const babel = require('@babel/core');

          const inputFile = 'BOLSA2.HTML';
          const outputFile = 'BOLSA.HTML';

          try {
            let html = fs.readFileSync(inputFile, 'utf8');
            
            console.log('📄 HTML original cargado');
            console.log(`   Tamaño: ${(html.length / 1024).toFixed(2)} KB`);
            
            // ESTRATEGIA: Buscar el script por su contenido característico
            // El script de React tiene "createRoot" y "ReactDOM"
            
            // Buscar el bloque que contiene createRoot (el más característico)
            const createRootIndex = html.indexOf('createRoot(document.getElementById');
            
            if (createRootIndex === -1) {
              console.error('❌ No se encontró createRoot. El archivo no tiene estructura React válida');
              process.exit(1);
            }

            console.log('✅ Encontrado createRoot en el archivo');

            // Retroceder para encontrar el <script> más cercano
            let scriptStartIndex = html.lastIndexOf('<script', createRootIndex);
            if (scriptStartIndex === -1) {
              console.error('❌ No se encontró <script> antes de createRoot');
              process.exit(1);
            }

            console.log('✅ Encontrado <script> de apertura');

            // Avanzar para encontrar el > (cierre de la etiqueta de apertura)
            let scriptTagEnd = html.indexOf('>', scriptStartIndex);
            if (scriptTagEnd === -1) {
              console.error('❌ No se encontró cierre de <script>');
              process.exit(1);
            }

            // Ahora buscar el </script> más cercano DESPUÉS de createRoot
            let scriptEndIndex = html.indexOf('</script>', createRootIndex);
            if (scriptEndIndex === -1) {
              console.error('❌ No se encontró </script>');
              process.exit(1);
            }

            // Extraer el contenido entre <script> y </script>
            const jsxCode = html.substring(scriptTagEnd + 1, scriptEndIndex);
            console.log(`✅ JSX extraído: ${jsxCode.length} caracteres`);

            // Compilar con Babel
            console.log('🔄 Compilando JSX...');
            let compiled;
            try {
              compiled = babel.transformSync(jsxCode, {
                presets: [
                  ['@babel/preset-react', { runtime: 'automatic' }],
                  ['@babel/preset-env', { 
                    targets: { esmodules: true },
                    modules: false 
                  }]
                ]
              }).code;
              console.log('✅ Compilación exitosa');
              console.log(`   Código compilado: ${compiled.length} caracteres`);
            } catch (babelErr) {
              console.error('❌ Error en Babel:', babelErr.message);
              console.error('   Línea:', babelErr.loc);
              throw babelErr;
            }

            // Reemplazar el script original con el compilado
            const wrappedCode = `
          window.addEventListener('DOMContentLoaded', () => {
            try {
          ${compiled}
            } catch (err) {
              console.error("❌ Error ejecutando React:", err);
              if (typeof eruda !== 'undefined') {
                eruda.init();
                eruda.show();
              }
            }
          });
            `;

            // Hacer el reemplazo
            html = html.substring(0, scriptTagEnd + 1) + 
                   wrappedCode + 
                   html.substring(scriptEndIndex);

            console.log('✅ Script compilado insertado en HTML');

            // Limpiar Babel Standalone ya que no lo necesitamos
            html = html.replace(/<script\s+[^>]*src="[^"]*babel\.min\.js"[^>]*><\/script>/gi, '');
            console.log('✅ Babel Standalone removido');

            // Limpiar la inicialización de window.Babel
            html = html.replace(/<script>\s*window\.Babel\s*=\s*\{[^}]*\};\s*<\/script>/gi, '');
            console.log('✅ Inicialización de Babel removida');

            // Escribir el archivo
            fs.writeFileSync(outputFile, html);
            
            console.log('\n' + '='.repeat(50));
            console.log('✅ COMPILACIÓN COMPLETADA EXITOSAMENTE');
            console.log('='.repeat(50));
            console.log(`📝 Entrada: ${inputFile}`);
            console.log(`📝 Salida: ${outputFile}`);
            console.log(`📊 Tamaño original: ${(fs.readFileSync(inputFile).length / 1024).toFixed(2)} KB`);
            console.log(`📊 Tamaño compilado: ${(html.length / 1024).toFixed(2)} KB`);

          } catch (err) {
            console.error('\n❌ ERROR FATAL:', err.message);
            if (err.stack) {
              console.error(err.stack);
            }
            process.exit(1);
          }
          EOF

      - name: Ejecutar compilacion
        run: node compile.js

      - name: Verificar que BOLSA.HTML tiene contenido
        run: |
          echo "📊 Verificando BOLSA.HTML..."
          
          SIZE=$(wc -c < BOLSA.HTML)
          SIZE_KB=$(echo "scale=2; $SIZE / 1024" | bc)
          echo "Tamaño: $SIZE_KB KB"
          
          # Verificar que tiene contenido mínimo
          if [ $SIZE -lt 5000000 ]; then
            echo "⚠️  BOLSA.HTML es pequeño (< 5 MB)"
            echo "   Primeros 1000 caracteres:"
            head -c 1000 BOLSA.HTML
            echo ""
            echo "   Últimos 500 caracteres:"
            tail -c 500 BOLSA.HTML
            exit 1
          fi
          
          echo "✅ BOLSA.HTML tiene tamaño correcto (> 5 MB)"

      - name: Guardar y subir BOLSA.HTML
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add BOLSA.HTML
          git commit -m "style: precompilar React automáticamente" || echo "Sin cambios"
          git push
