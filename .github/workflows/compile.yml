name: Compilador de React Automático 

on:
  push:
    branches:
      - main
    paths:
      - 'BOLSA2.HTML'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Instalar Babel y dependencias
        run: npm install @babel/core @babel/preset-react @babel/preset-env

      - name: Crear script de compilacion
        run: |
          cat << 'EOF' > compile.js
          const fs = require('fs');
          const babel = require('@babel/core');

          const inputFile = 'BOLSA2.HTML';
          const outputFile = 'BOLSA.HTML';

          try {
            let html = fs.readFileSync(inputFile, 'utf8');
            
            console.log('📄 HTML original cargado');
            console.log(`   Tamaño: ${(html.length / 1024).toFixed(2)} KB`);
            
            // ESTRATEGIA: Buscar el patrón exacto del script que contiene el App component
            // Patrón: Buscar desde const App = () => { hasta createRoot(document.getElementById('root')).render(<App />);
            
            // Primero, encontrar donde empieza el App component
            const appStartPattern = 'const App = () => {';
            const appStartIndex = html.indexOf(appStartPattern);
            
            if (appStartIndex === -1) {
              console.error('❌ No se encontró "const App = () => {"');
              process.exit(1);
            }
            
            console.log('✅ Encontrado inicio del componente App');

            // Encontrar el cierre del componente (la línea que dice createRoot)
            const createRootPattern = "createRoot(document.getElementById('root')).render(<App />);";
            const createRootIndex = html.indexOf(createRootPattern, appStartIndex);
            
            if (createRootIndex === -1) {
              console.error('❌ No se encontró createRoot render');
              process.exit(1);
            }
            
            console.log('✅ Encontrado createRoot render');

            // Extraer el código JSX completo
            // Necesitamos TODO desde el import/const inicial hasta createRoot
            // Buscar hacia atrás para encontrar dónde empieza el <script>
            let scriptOpenIndex = html.lastIndexOf('<script', appStartIndex);
            let scriptOpenEnd = html.indexOf('>', scriptOpenIndex) + 1;
            
            // Encontrar el cierre </script> después de createRoot
            let scriptCloseIndex = html.indexOf('</script>', createRootIndex);
            
            const fullJsxCode = html.substring(scriptOpenEnd, scriptCloseIndex);
            
            console.log(`✅ JSX extraído: ${fullJsxCode.length} caracteres`);
            console.log('🔄 Compilando JSX...');

            // Compilar
            let compiled;
            try {
              compiled = babel.transformSync(fullJsxCode, {
                presets: [
                  ['@babel/preset-react', { runtime: 'automatic' }],
                  ['@babel/preset-env', { 
                    targets: { esmodules: true },
                    modules: false 
                  }]
                ]
              }).code;
              console.log('✅ Compilación exitosa');
              console.log(`   Resultado: ${compiled.length} caracteres`);
            } catch (babelErr) {
              console.error('❌ Error en compilación Babel:');
              console.error('   ' + babelErr.message);
              if (babelErr.loc) {
                console.error(`   Línea: ${babelErr.loc.line}, Columna: ${babelErr.loc.column}`);
              }
              process.exit(1);
            }

            // Envolver el código compilado
            const wrappedCode = `
          window.addEventListener('DOMContentLoaded', () => {
            try {
          ${compiled}
            } catch (err) {
              console.error("❌ Error ejecutando React:", err);
              if (typeof eruda !== 'undefined') {
                eruda.init();
                eruda.show();
              }
            }
          });
            `;

            // Reemplazar el script original con el compilado
            // Reemplazar desde <script> (antes de App) hasta </script> (después de createRoot)
            html = html.substring(0, scriptOpenIndex) + 
                   '<script>\n' + wrappedCode + '\n</script>' +
                   html.substring(scriptCloseIndex + '</script>'.length);

            console.log('✅ Script React compilado e insertado');

            // Eliminar el segundo script (el que transpila en runtime)
            // Este es el que está entre líneas 15690-15710
            const runtimeCompileRegex = /<script>\s*window\.addEventListener\('DOMContentLoaded'[\s\S]*?Babel\.transform[\s\S]*?<\/script>/;
            const beforeSize = html.length;
            html = html.replace(runtimeCompileRegex, '');
            if (html.length < beforeSize) {
              console.log('✅ Script de transpilación en runtime removido');
            }

            // Eliminar Babel Standalone
            html = html.replace(/<script\s+[^>]*src="[^"]*babel\.min\.js"[^>]*><\/script>/gi, '');
            console.log('✅ Babel Standalone removido');

            // Eliminar inicialización de window.Babel
            html = html.replace(/<script>\s*window\.Babel\s*=\s*\{[^}]*\};\s*<\/script>/gi, '');
            console.log('✅ Inicialización de Babel removida');

            // Guardar
            fs.writeFileSync(outputFile, html);
            
            console.log('\n' + '='.repeat(60));
            console.log('✅ COMPILACIÓN COMPLETADA EXITOSAMENTE');
            console.log('='.repeat(60));
            console.log(`📝 Entrada: ${inputFile}`);
            console.log(`📝 Salida: ${outputFile}`);
            console.log(`📊 Tamaño original: ${(fs.readFileSync(inputFile).length / 1024).toFixed(2)} KB`);
            console.log(`📊 Tamaño compilado: ${(html.length / 1024).toFixed(2)} KB`);
            console.log('='.repeat(60));

          } catch (err) {
            console.error('\n❌ ERROR FATAL:');
            console.error(err.message);
            if (err.stack) {
              console.error('\nStack trace:');
              console.error(err.stack);
            }
            process.exit(1);
          }
          EOF

      - name: Ejecutar compilacion
        run: node compile.js

      - name: Verificar que BOLSA.HTML tiene contenido
        run: |
          echo "📊 Verificando BOLSA.HTML..."
          
          SIZE=$(wc -c < BOLSA.HTML)
          SIZE_KB=$(echo "scale=2; $SIZE / 1024" | bc)
          echo "Tamaño: $SIZE_KB KB (~$(echo "scale=0; $SIZE / 1024 / 1024" | bc) MB)"
          
          # Verificar que tiene contenido mínimo (5 MB)
          if [ $SIZE -lt 5242880 ]; then
            echo ""
            echo "⚠️  ADVERTENCIA: BOLSA.HTML parece pequeño"
            echo "   Primeros 500 caracteres:"
            head -c 500 BOLSA.HTML
            echo ""
            echo ""
            echo "   Últimos 500 caracteres:"
            tail -c 500 BOLSA.HTML
            exit 1
          fi
          
          echo "✅ BOLSA.HTML verificado correctamente"
          
          # Verificar que contiene elementos críticos
          if ! grep -q "createRoot" BOLSA.HTML; then
            echo "❌ BOLSA.HTML no contiene 'createRoot'"
            exit 1
          fi
          echo "✅ Contiene createRoot"
          
          if ! grep -q "React" BOLSA.HTML; then
            echo "❌ BOLSA.HTML no contiene referencias a React"
            exit 1
          fi
          echo "✅ Contiene referencias a React"

      - name: Guardar y subir BOLSA.HTML
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add BOLSA.HTML
          git commit -m "style: precompilar React automáticamente" || echo "Sin cambios"
          git push
