(function() {
    function showErudaAndLog(errObj) {
        if (typeof eruda === 'undefined' || !window.eruda) return;
        if (!window.eruda._isInit) {
            eruda.init();
            eruda.show();
            console.warn("⚠️ BoardingGate: Se ha detectado un error. Eruda activado.");
        }
        if (errObj) {
            console.error("Detalle del error:", errObj);
        }
    }

    window.onerror = function(message, source, lineno, colno, error) {
        const msg = typeof message === 'string' ? message : (message && message.message ? message.message : "");
        // Ignorar errores genéricos de origen cruzado de widgets (como TradingView) o bloqueos de extensiones/adblockers
        if (msg.includes("Script error") || !source || lineno === 0 || msg === "Script error.") {
            return false; 
        }
        showErudaAndLog(error || message);
        return false; 
    };

    window.onunhandledrejection = function(event) {
        const reason = event.reason || "";
        const msg = typeof reason === 'string' ? reason : (reason.message || "");
        // Ignorar fallos de red causados por bloqueos de Adblockers en consultas de terceros
        if (msg.includes("Failed to fetch") || msg.includes("Load failed") || msg.includes("Script error") || msg.includes("NetworkError")) {
            return;
        }
        showErudaAndLog(reason || "Promesa rechazada sin motivo detallado");
    };
})();

function doPost(e) {
  var lock = LockService.getScriptLock(); 
  lock.tryLock(10000);
  try {
    var data = JSON.parse(e.postData.contents);
    var fileName = "BOARDINGGATE_DB.json";
    var backupName = "BOARDINGGATE_DB.json.bak";
    var files = DriveApp.getFilesByName(fileName);
    if (files.hasNext()) {
      var file = files.next();
      var backupFiles = DriveApp.getFilesByName(backupName);
      var backupFile = backupFiles.hasNext() ? backupFiles.next() : DriveApp.createFile(backupName, "", MimeType.PLAIN_TEXT);
      backupFile.setContent(file.getBlob().getDataAsString());
      file.setContent(JSON.stringify(data));
    } else {
      DriveApp.createFile(fileName, JSON.stringify(data), MimeType.PLAIN_TEXT);
    }
    return ContentService.createTextOutput(JSON.stringify({ status: "success", timestamp: data.timestamp })).setMimeType(ContentService.MimeType.JSON);
  } catch(err) { 
    return ContentService.createTextOutput(JSON.stringify({status: "error", error: err.toString()})).setMimeType(ContentService.MimeType.JSON); 
  } finally { lock.releaseLock(); }
}

function doGet(e) {
   if (e.parameter.anchor === "true" && e.parameter.ticker) {
    return fetchTradingViewAnchorData(e.parameter.ticker);
  }

   if (e.parameter.intrinsic === "true" && e.parameter.ticker) {
    return fetchFundamentalData(e.parameter.ticker);
  }

  if (e.parameter.screener === "true") {
    return executeTradingViewScreener(e.parameter);
  }
  if (e.parameter.tickers) { return fetchStockData(e.parameter.tickers); }
  try {
    var fileName = e.parameter.restoreBak === "true" ? "BOARDINGGATE_DB.json.bak" : "BOARDINGGATE_DB.json";
    var files = DriveApp.getFilesByName(fileName);
    if (files.hasNext()) { return ContentService.createTextOutput(files.next().getBlob().getDataAsString()).setMimeType(ContentService.MimeType.JSON); }
    return ContentService.createTextOutput(JSON.stringify({timestamp:0})).setMimeType(ContentService.MimeType.JSON);
  } catch(err) { return ContentService.createTextOutput(JSON.stringify({error:err.toString()})).setMimeType(ContentService.MimeType.JSON); }
}

function fetchTradingViewAnchorData(rawTicker) {
  var cleanSym = rawTicker.toUpperCase().trim();
  if (cleanSym.includes(":")) {
    cleanSym = cleanSym.split(":")[1];
  } else if (cleanSym.includes(".")) {
    cleanSym = cleanSym.split(".")[0];
  }
  
  var payload = {
    "filter": [
      { "left": "name", "operation": "equal", "right": cleanSym }
    ],
    "options": { "lang": "es" },
    "markets": ["america", "spain", "uk", "germany", "france", "japan", "hongkong", "canada", "australia", "italy", "switzerland", "netherlands"],
    "columns": [
      "name",                         // d[0]
      "description",                  // d[1]
      "close",                        // d[2]
      "price_52_week_high",           // d[3]
      "price_earnings_ttm",           // d[4]
      "eps_ttm",                      // d[5]
      "dividend_yield_recent",        // d[6]
      "beta_1_year",                  // d[7]
      "fifty_two_week_low",           // d[8]
      "market_cap_basic"              // d[9]
    ]
  };

  var options = {
    "method": "post",
    "contentType": "application/json",
    "headers": { "User-Agent": "Mozilla/5.0" },
    "payload": JSON.stringify(payload),
    "muteHttpExceptions": true
  };

  var res = { success: false, ticker: rawTicker };
  try {
    var response = UrlFetchApp.fetch("https://scanner.tradingview.com/global/scan", options);
    if (response.getResponseCode() === 200) {
      var json = JSON.parse(response.getContentText());
      if (json.data && json.data.length > 0) {
        var d = json.data[0].d;
        
        var rawMc = d[9] || 0;
        var formattedMc = "N/D";
        if (rawMc >= 1e12) formattedMc = (rawMc / 1e12).toFixed(2) + " T";
        else if (rawMc >= 1e9) formattedMc = (rawMc / 1e9).toFixed(2) + " B";
        else if (rawMc >= 1e6) formattedMc = (rawMc / 1e6).toFixed(2) + " M";

        res = {
          success: true,
          ticker: rawTicker,
          p: d[2] ? d[2].toFixed(2) : "N/D",
          mc: formattedMc,
          pe: d[4] ? d[4].toFixed(2) : "N/D",
          eps: d[5] ? d[5].toFixed(2) : "N/D",
          div: d[6] ? d[6].toFixed(2) : "0.00",
          beta: d[7] ? d[7].toFixed(2) : "1.00",
          h52: d[8] && d[3] ? (d[8].toFixed(2) + " - " + d[3].toFixed(2)) : "N/D"
        };
      }
    }
  } catch (err) {
    res.error = err.toString();
  }
  return ContentService.createTextOutput(JSON.stringify(res)).setMimeType(ContentService.MimeType.JSON);
}

function executeTradingViewScreener(params) {
  var regionMap = {
    'USA': 'america', 'SPAIN': 'spain', 'UK': 'uk', 'GERMANY': 'germany',
    'FRANCE': 'france', 'JAPAN': 'japan', 'CHINA_HK': 'hongkong', 'CANADA': 'canada',
    'AUSTRALIA': 'australia', 'ITALY': 'italy', 'SWITZERLAND': 'switzerland', 'NETHERLANDS': 'netherlands'
  };
  
  var market = regionMap[params.region] || 'america';
  var limit = parseInt(params.limit) || 20;
  
  var payload = {
    "filter": [
      { "left": "type", "operation": "in_range", "right": ["stock", "dr"] }
    ],
    "options": { "lang": "es" },
    "markets": [market],
    "columns": [
      "name",                                     // d[0]
      "description",                              // d[1]
      "close",                                    // d[2]
      "price_52_week_high",                       // d[3]
      "price_earnings_ttm",                       // d[4]
      "price_earnings_growth_ttm",                // d[5] (PEG)
      "return_on_equity_fq",                      // d[6] (ROI)
      "dividend_yield_recent",                    // d[7] (Yield)
      "price_book_ratio",                         // d[8] (P/B)
      "debt_to_equity_fq",                        // d[9] (D/E)
      "free_cash_flow_margin_ttm",                // d[10] (FCF%)
      "earnings_per_share_diluted_yoy_growth_ttm" // d[11] (Crec. EPS YoY)
    ],
    "sort": { "sortBy": "market_cap_basic", "sortOrder": "desc" },
    "range": [0, 800] 
  };

  var options = {
    "method": "post",
    "contentType": "application/json",
    "headers": {
      "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/121.0.0.0 Safari/537.36"
    },
    "payload": JSON.stringify(payload),
    "muteHttpExceptions": true
  };

  try {
    var url = "https://scanner.tradingview.com/global/scan";
    var res = UrlFetchApp.fetch(url, options);
    var json = JSON.parse(res.getContentText());
    if (!json.data) return ContentService.createTextOutput(JSON.stringify({error: "No hay datos."})).setMimeType(ContentService.MimeType.JSON);

    var results = [];
    for (var i = 0; i < json.data.length; i++) {
      var d = json.data[i].d;
      
      var row = {
        ticker: d[0], name: d[1], price: d[2], high52: d[3],
        per: d[4], peg: d[5], roi: d[6], divYield: d[7],
        pb: d[8], de: d[9], fcf: d[10], epsGrowth: d[11]
      };

      if (params.per && (row.per === null || row.per <= 0 || row.per > parseFloat(params.per))) continue;
      if (params.divYield && (row.divYield === null || row.divYield < parseFloat(params.divYield))) continue;
      if (params.roi && (row.roi === null || row.roi < parseFloat(params.roi))) continue;
      if (params.peg && (row.peg === null || row.peg > parseFloat(params.peg))) continue;
      if (params.pb && (row.pb === null || row.pb > parseFloat(params.pb))) continue;
      if (params.debtEquity && (row.de === null || row.de > parseFloat(params.debtEquity) * 100)) continue;
      if (params.epsGrowth && (row.epsGrowth === null || row.epsGrowth < parseFloat(params.epsGrowth))) continue;

      var trendStr = "-";
      var dropFromHigh = row.high52 > 0 ? (row.price - row.high52) / row.high52 : 0; 
      if (params.trend === 'ath') {
         if (dropFromHigh < -0.05) continue; 
         trendStr = "Máximos (ATH)";
      } else if (params.trend === 'drop') {
         var limitDrop = - (parseFloat(params.dropPct) || 20) / 100;
         if (dropFromHigh > limitDrop) continue; 
         trendStr = "Desplome";
      }

      results.push({
        ticker: row.ticker, name: row.name, price: parseFloat(row.price.toFixed(2)), trendStatus: trendStr,
        per: row.per ? parseFloat(row.per.toFixed(2)) : "N/A",
        peg: row.peg ? parseFloat(row.peg.toFixed(2)) : "N/A",
        roi: row.roi ? parseFloat(row.roi.toFixed(2)) : "N/A",
        divYield: row.divYield ? parseFloat(row.divYield.toFixed(2)) : "N/A",
        pb: row.pb ? parseFloat(row.pb.toFixed(2)) : "N/A",
        debtEquity: row.de ? parseFloat((row.de/100).toFixed(2)) : "N/A",
        fcf: row.fcf ? parseFloat(row.fcf.toFixed(2)) : "N/A",
        epsGrowth: row.epsGrowth ? parseFloat(row.epsGrowth.toFixed(2)) : "N/A"
      });
      if (results.length >= limit) break;
    }
    return ContentService.createTextOutput(JSON.stringify(results)).setMimeType(ContentService.MimeType.JSON);
  } catch(err) {
    return ContentService.createTextOutput(JSON.stringify({error: err.toString()})).setMimeType(ContentService.MimeType.JSON);
  }
}

function fetchStockData(tickersString) {
  var tickerList = tickersString.split(",");
  var requests = [];
  var validTickers = [];
  var yahooSymbols = [];

  for (var i = 0; i < tickerList.length; i++) {
    var rawTicker = tickerList[i].trim();
    if (!rawTicker) continue;
    var yahooTicker = convertToYahoo(rawTicker);
    var url = "https://query1.finance.yahoo.com/v8/finance/chart/" + 
              encodeURIComponent(yahooTicker) + 
              "?interval=1d&range=5d&includePrePost=true";
    requests.push({
      url: url,
      method: "GET",
      muteHttpExceptions: true,
      headers: {
        "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36",
        "Accept": "application/json"
      }
    });
    validTickers.push(rawTicker);
    yahooSymbols.push(yahooTicker);
  }

  var results = {};
  var responses = UrlFetchApp.fetchAll(requests);

  for (var j = 0; j < responses.length; j++) {
    var rawTicker = validTickers[j];
    var res = { success: false };
    var code = responses[j].getResponseCode();
    if (code === 200) {
      try {
        var json = JSON.parse(responses[j].getContentText());
        var resultObj = json.chart.result[0];
        var meta = resultObj.meta;        
        
       var p = meta.preMarketPrice || meta.regularMarketPrice || meta.postMarketPrice || 0;
        var pc = meta.regularMarketPreviousClose || meta.previousClose || meta.chartPreviousClose || 0;
        
       try {
          var quote = resultObj.indicators.quote[0];
          if (quote && quote.close && quote.close.length > 0) {
           var closes = quote.close.filter(function(v) { 
              return v !== null && v !== undefined && typeof v === 'number' && v > 0; 
            });
            
            if (closes.length >= 2) {
              p = closes[closes.length - 1];   // Último precio real registrado
              pc = closes[closes.length - 2];  // Cierre de la sesión de bolsa inmediatamente anterior
            } else if (closes.length === 1) {
              p = closes[0];
            }
          }
        } catch (errQuote) {
          Logger.log("Incapaz de extraer serie temporal para " + rawTicker + ": " + errQuote.toString());
        }

        if (p > 0) {
          res.p = p;
          res.pc = pc;
          res.success = true;
        } else {
          res.error = "Precio 0 en respuesta.";
        }
      } catch(err) {
        res.error = "Error JSON: " + err.toString();
      }
    } else {
      res.error = "HTTP " + code;
      Logger.log("❌ " + rawTicker + " (" + yahooSymbols[j] + ") → HTTP " + code);
    }
    results[rawTicker] = res;
  }
  return ContentService.createTextOutput(JSON.stringify(results)).setMimeType(ContentService.MimeType.JSON);
}

function convertToYahoo(rawTicker) {
  if (!rawTicker || typeof rawTicker !== 'string') {
    return "";
  }
  
  var indexMap = {
    "INDEXSP:.INX":     "^GSPC",
    "INDEXDJX:.DJI":    "^DJI", 
    "INDEXNASDAQ:.IXIC":"^IXIC",
    "INDEXRUSSELL:RUT": "^RUT",
    "INDEXCBOE:VIX":    "^VIX",
    "INDEXFTSE:UKX":    "^FTSE",
    "INDEXEURO:SX5E":   "^STOXX50E",
    "BME:IBEX":         "^IBEX",
    "INDEXBVB:BET":     "^BET"
  };

  if (indexMap[rawTicker]) return indexMap[rawTicker];

  if (rawTicker.includes(":")) {
    var parts = rawTicker.split(":");
    var exchange = parts[0].toUpperCase();
    var sym = parts[1].toUpperCase();
    var exchangeMap = {
      "BME": ".MC", "EPA": ".PA", "ETR": ".DE", "LON": ".L",
      "BIT": ".MI", "AMS": ".AS", "SWX": ".SW", "TSE": ".TO",
      "ASX": ".AX", "HKG": ".HK", "TYO": ".T",
      "NYSE": "", "NASDAQ": "", "INDEXSP": "", "INDEXDJX": "", "INDEXNASDAQ": ""
    };
    return sym + (exchangeMap[exchange] !== undefined ? exchangeMap[exchange] : "." + exchange);
  }

  if (rawTicker.length === 6 && !rawTicker.includes(".") && !rawTicker.includes("-")) {
    return rawTicker + "=X";
  }

  return rawTicker;
}

function fetchFundamentalData(rawTicker) {
  if (!rawTicker) {
    return ContentService.createTextOutput(JSON.stringify({
      success: false, 
      error: "Error: No se ha proporcionado un ticker válido para la consulta."
    })).setMimeType(ContentService.MimeType.JSON);
  }

  var yahooTicker = convertToYahoo(rawTicker);
  var baseUrl = "https://query1.finance.yahoo.com/v10/finance/quoteSummary/" + 
                encodeURIComponent(yahooTicker) + 
                "?modules=financialData,defaultKeyStatistics,cashflowStatementHistory,earningsTrend";
  
  var result = {
    success: false,
    ticker: rawTicker,
    freeCashFlow: 0,
    totalCash: 0,
    totalDebt: 0,
    sharesOutstanding: 1,
    beta: 1.0,
    growthRate: 7.5, 
    growthSource: "Estimación conservadora (Por defecto)",
    error: ""
  };
  
  try {
    var response = fetchWithYahooAuth(baseUrl);
    var responseCode = response.getResponseCode();
    
    if (responseCode === 200) {
      var json = JSON.parse(response.getContentText());
      if (json.quoteSummary && json.quoteSummary.result && json.quoteSummary.result.length > 0) {
        var summary = json.quoteSummary.result[0];
        
        var financialData = summary.financialData || {};
        var keyStats = summary.defaultKeyStatistics || {};
        var cashflowHistory = summary.cashflowStatementHistory?.cashflowStatements || [];
        var earningsTrend = summary.earningsTrend || {};
        
       if (financialData.freeCashflow && financialData.freeCashflow.raw !== undefined) {
          result.freeCashFlow = financialData.freeCashflow.raw;
        } else if (cashflowHistory.length > 0) {
          result.freeCashFlow = getFCFFromStatement(cashflowHistory[0]);
        }
        
        result.totalCash = financialData.totalCash?.raw || 0;
        result.totalDebt = financialData.totalDebt?.raw || 0;
        
        // 3. Acciones en circulación
        result.sharesOutstanding = keyStats.sharesOutstanding?.raw || 1;
        
       result.beta = keyStats.beta?.raw || 1.0;
        
         var projectedGrowth = null;
        
        var trends = earningsTrend.trend || [];
        for (var i = 0; i < trends.length; i++) {
          if (trends[i].period === "+5y" && trends[i].growth && trends[i].growth.raw !== undefined) {
            projectedGrowth = trends[i].growth.raw * 100;
            result.growthSource = "Consenso de Analistas (Previsión 5 años Wall Street)";
            break;
          }
        }
        
        if ((projectedGrowth === null || isNaN(projectedGrowth)) && cashflowHistory.length >= 3) {
          try {
            var fcfLatest = getFCFFromStatement(cashflowHistory[0]);
            var fcfOldest = getFCFFromStatement(cashflowHistory[cashflowHistory.length - 1]);
            
            if (fcfLatest > 0 && fcfOldest > 0) {
              var nYears = cashflowHistory.length - 1;
             var cagr = (Math.pow(fcfLatest / fcfOldest, 1 / nYears) - 1) * 100;
              
              if (!isNaN(cagr) && cagr > 0 && cagr < 55) {
                projectedGrowth = cagr;
                result.growthSource = "Cálculo Matemático (CAGR histórico del FCF a 3 años)";
              }
            }
          } catch(e) {
          }
        }
        
        if (projectedGrowth !== null && !isNaN(projectedGrowth)) {
          result.growthRate = Number(projectedGrowth.toFixed(2));
        }
        
        result.success = true;
      } else {
        result.error = "Error al estructurar los datos fundamentales.";

function getFCFFromStatement(statement) {
  var ocf = statement.totalCashFromOperatingActivities?.raw || 0;
  var capex = statement.capitalExpenditures?.raw || 0;
  return ocf + capex; // CapEx suele venir en formato negativo
}

function fetchWithYahooAuth(targetUrl) {
  var userAgent = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36";
  
  try {
     var consentResponse = UrlFetchApp.fetch("https://fc.yahoo.com", {
      "followRedirects": false,
      "muteHttpExceptions": true,
      "headers": { "User-Agent": userAgent }
    });
    
    var headers = consentResponse.getHeaders();
    var setCookie = headers["Set-Cookie"] || headers["set-cookie"];
    
    if (!setCookie) {
      return UrlFetchApp.fetch(targetUrl, { "muteHttpExceptions": true, "headers": { "User-Agent": userAgent } });
    }
    
     var cookie = Array.isArray(setCookie) ? setCookie.join("; ") : setCookie;
    
    var crumbResponse = UrlFetchApp.fetch("https://query1.finance.yahoo.com/v1/test/getcrumb", {
      "method": "GET",
      "headers": {
        "Cookie": cookie,
        "User-Agent": userAgent
      },
      "muteHttpExceptions": true
    });
    
    var crumb = crumbResponse.getContentText().trim();
    
    if (!crumb || crumb.includes("Error") || crumbResponse.getResponseCode() !== 200) {
       return UrlFetchApp.fetch(targetUrl, { "muteHttpExceptions": true, "headers": { "User-Agent": userAgent } });
    }
    
    var finalUrl = targetUrl + "&crumb=" + encodeURIComponent(crumb);
    
    return UrlFetchApp.fetch(finalUrl, {
      "method": "GET",
      "headers": {
        "Cookie": cookie,
        "User-Agent": userAgent
      },
      "muteHttpExceptions": true
    });
    
  } catch (e) {
   return UrlFetchApp.fetch(targetUrl, { 
      "muteHttpExceptions": true, 
      "headers": { "User-Agent": userAgent } 
    });
  }
}
