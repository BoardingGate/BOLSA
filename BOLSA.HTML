    <script>
    (function() {
        function showErudaAndLog(errObj) {
            if (!window.eruda._isInit) {
                eruda.init();
                eruda.show();
                console.warn("⚠️ BoardingGate: Se ha detectado un error. Eruda activado.");
            }
            if (errObj) {
                console.error("Detalle del error:", errObj);
            }
        }

        window.onerror = function(message, source, lineno, colno, error) {
            showErudaAndLog(error || message);
            return false; 
        };

        window.onunhandledrejection = function(event) {
            showErudaAndLog(event.reason || "Promesa rechazada sin motivo detallado");
        };
    })();
    </script>
    
    <meta name="robots" content="index, follow" />

     <style>

      .prose-content h3 { font-size: 1.1rem; font-weight: 700; color: #60a5fa; margin-top: 1.2rem; margin-bottom: 0.5rem; text-transform: uppercase; border-bottom: 1px solid #334155; }

      .snap-x { scroll-snap-type: x mandatory; }

        #tv_chart_container,

        .snap-x {

        overflow-x: auto;

    .timeline-tree { text-align: center; white-space: nowrap; padding: 40px; transform-origin: 50% 0; }
    .timeline-tree ul { padding-top: 40px; position: relative; display: flex; justify-content: center; }
    .timeline-tree li { padding: 40px 10px 0 10px; position: relative; list-style-type: none; }
    
    .timeline-tree li::before, .timeline-tree li::after { content: ''; position: absolute; top: 0; right: 50%; border-top: 3px solid #475569; width: 50%; height: 40px; }
    .timeline-tree li::after { right: auto; left: 50%; border-left: 3px solid #475569; }
    
    .timeline-tree li:only-child::after, .timeline-tree li:only-child::before { display: none; }
    .timeline-tree li:only-child { padding-top: 0; }
    .timeline-tree li:first-child::before, .timeline-tree li:last-child::after { border: 0 none; }
    .timeline-tree li:last-child::before { border-right: 3px solid #475569; border-radius: 0 15px 0 0; }
    .timeline-tree li:first-child::after { border-radius: 15px 0 0 0; }
    .timeline-tree ul ul::before { content: ''; position: absolute; top: 0; left: 50%; border-left: 3px solid #475569; width: 0; height: 40px; }

    @media print {
    body * { visibility: hidden; } /* Ocultamos todo el cuerpo */
    .print-only, .print-only * { visibility: visible; } /* Mostramos solo el grafo */
    .print-only { position: absolute; left: 0; top: 0; }
    .no-print { display: none !important; }
    }
